      - generic [ref=e6]: Tên chỉ số được suy ra từ icon trong sheet (icon không xuất ra được) — báo mình nếu có tên nào sai để sửa lại.
      - generic [ref=e7]:
        - heading "Ưu tiên reroll (theo thứ tự)" [level=2] [ref=e9]
        - generic [ref=e10]: Overall Order của tác giả — cao → thấp.
        - generic [ref=e11]:
          - generic [ref=e12]:
            - generic [ref=e13]:
              - generic [ref=e14]: 1st
              - generic [ref=e15]: Speed
            - generic [ref=e16]: Top priority for the both PVP and PVE. For PVE you want to give it to supports - Cleopatra, Atropos, or any other buffer that has to apply buffs before your main DPS heroes.
          - generic [ref=e17]:
            - generic [ref=e18]:
              - generic [ref=e19]: 2nd
              - generic [ref=e20]: ATK
            - generic [ref=e21]: One of the top priorities; higher ATK = higher Heals/Shields/Buffs/Pledge etc. Get it as a 3rd priority, after you got Speed & Accuracy. First if your aim is PVE (RO).
          - generic [ref=e22]:
            - generic [ref=e23]:
              - generic [ref=e24]: 3rd
              - generic [ref=e25]: Dodge
            - generic [ref=e26]: Top priority for PVP. Dodge is highly relevant, so counter it with the Accuracy is the one of the keys to securing Victory.
          - generic [ref=e27]:
            - generic [ref=e28]:
              - generic [ref=e29]: 4th
              - generic [ref=e30]: Ultimate DMG Reduction
            - generic [ref=e31]: One of the top priorities; given the current state of the game, there's a lot of ULT spammers in the PVP (Pandora, Diana, Eve, Odin..) so reducing those will come in handy.
          - generic [ref=e32]:
            - generic [ref=e33]:
              - generic [ref=e34]: 5th
              - generic [ref=e35]: Healing
            - generic [ref=e36]: Priority on the heroes that need sustain the most and the Doomsdayers. After that, get it for anyone - starting with the heroes you're using the most (in PVP) - for PVE, this effect isn't going to matter.
      - generic [ref=e37]:
        - heading "Tuỳ tình huống" [level=2] [ref=e39]
        - generic [ref=e40]: Chỉ reroll khi đã xong hết các chỉ số ưu tiên.
        - generic [ref=e41]:
          - generic [ref=e42]:
            - generic [ref=e43]:
              - generic [ref=e44]: As you wish
              - generic [ref=e45]: DEF
            - generic [ref=e46]: Skip. Defence is completely useless in PVP/PVE game modes.
            - generic [ref=e47]:
              - generic [ref=e48]: VD / Ghi chú
              - generic [ref=e49]: Only start to reroll these once you're truly done with every other accessory stat that takes the higher priority over it.
          - generic [ref=e50]:
            - generic [ref=e51]:
              - generic [ref=e52]: As you wish
              - generic [ref=e53]: Skill DMG Reduction
            - generic [ref=e54]: Reducing Skill Damage can come in handy in some cases but it's nowhere near the priority for the rerolls, only last resort.
            - generic [ref=e55]:
              - generic [ref=e56]: VD / Ghi chú
              - generic [ref=e57]: Anyone with a Taunt (or Tank) effect in the team. The one that soaks the damage the most.
          - generic [ref=e58]:
            - generic [ref=e59]:
              - generic [ref=e60]: As you wish
              - generic [ref=e61]: Crit Rate
            - generic [ref=e62]: Not really a priority; only good vs. Protector based teams, Wukong or any other lesser used hero (like Lee). Most of the times this won't be crucial factor in the battle - skip until you've done everything else.
