<!-- ::: PAGE FRAGMENT ::: -->
<style>
  /* Mobile beginners-priority — neubrutalist ranked cards. Class names match
     the reused page script. */

  .page-beginners-priority .section { margin-bottom: 26px }
  .page-beginners-priority .section-head {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin: 0 0 12px; padding: 8px 10px;
    background: var(--ink); color: var(--on-dark);
  }
  .page-beginners-priority .section-head h2 {
    margin: 0; font-family: var(--font-display); font-size: 16px;
    text-transform: uppercase; letter-spacing: 0.3px; color: var(--on-dark);
  }
  .page-beginners-priority .section-head .pill {
    background: var(--c-amber); color: var(--ink);
    font-size: 11px; padding: 3px 8px; font-weight: 700;
    border: 2px solid var(--border);
  }
  .page-beginners-priority .section-intro {
    color: var(--body-color); font-size: 13.5px; line-height: 1.5; font-weight: 500;
    margin: 0 0 12px; border-left: 5px solid var(--c-cyan); padding-left: 10px;
  }

  .page-beginners-priority .priority-list { display: flex; flex-direction: column; gap: 10px }
  .page-beginners-priority .pcard {
    display: grid; grid-template-columns: 68px minmax(0, 1fr); gap: 10px;
    padding: 8px; background: var(--panel);
    border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm);
  }
  .page-beginners-priority .pcard:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px }
  .page-beginners-priority .pcard .portrait {
    width: 68px; height: 68px; overflow: hidden;
    background: var(--panel-soft); border: var(--border-w) solid var(--border); cursor: pointer;
  }
  .page-beginners-priority .pcard .portrait img { width: 100%; height: 100%; object-fit: cover; display: block }
  .page-beginners-priority .pcard .portrait .initials {
    width: 100%; height: 100%; display: grid; place-items: center;
    font-family: var(--font-display); font-size: 22px; color: var(--ink); background: var(--panel-strong);
  }
  .page-beginners-priority .pcard .body { min-width: 0 }
  .page-beginners-priority .pcard .row1 {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px;
  }
  .page-beginners-priority .pcard .name {
    font-size: 16px; font-weight: 700; color: var(--ink); cursor: pointer; letter-spacing: 0.1px;
  }
  .page-beginners-priority .pcard .tag {
    background: var(--c-violet); color: #fff;
    font-size: 10.5px; padding: 2px 8px; border: 2px solid var(--border);
    font-weight: 700; letter-spacing: 0.02em;
  }
  .page-beginners-priority .pcard .stars {
    display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap;
    margin-left: auto; font-size: 11px; color: var(--muted);
  }
  .page-beginners-priority .pcard .stars .pair { display: inline-flex; align-items: center; gap: 4px }
  .page-beginners-priority .pcard .stars .pair .lbl {
    text-transform: uppercase; letter-spacing: 0.06em; font-size: 9.5px; font-weight: 700;
  }
  .page-beginners-priority .pcard .stars .pair .val {
    color: var(--ink); font-weight: 700; font-size: 12px; font-family: var(--font-mono);
    border: 2px solid var(--border); padding: 1px 7px; font-variant-numeric: tabular-nums;
    white-space: normal; overflow-wrap: anywhere;
  }
  .page-beginners-priority .pcard .stars .pair .val.min { background: var(--c-cyan) }
  .page-beginners-priority .pcard .stars .pair .val.ideal { background: var(--c-amber) }
  .page-beginners-priority .pcard .summary {
    color: var(--body-color); font-size: 13.5px; line-height: 1.5; white-space: pre-wrap;
    overflow-wrap: anywhere; margin-top: 5px;
  }
  .page-beginners-priority .pcard .meta {
    display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; font-size: 12px;
  }
  .page-beginners-priority .pcard .meta .chunk { display: flex; gap: 6px; align-items: flex-start; min-width: 0 }
  .page-beginners-priority .pcard .meta .chunk .k {
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    font-size: 10px; font-weight: 700; padding-top: 2px; white-space: nowrap;
  }
  .page-beginners-priority .pcard .meta .chunk .v { color: var(--body-color); white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.45 }
  .page-beginners-priority .pcard .notes {
    margin-top: 8px; padding: 9px 10px; background: var(--panel-soft);
    border: var(--border-w) solid var(--border); border-left: 5px solid var(--c-violet);
    color: var(--body-color); font-size: 13px; line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere;
  }
  .page-beginners-priority .empty-result {
    text-align: center; color: var(--muted); padding: 40px; font-style: italic;
  }
</style>

<section class="page page-beginners-priority" data-tab="beginners-priority" hidden>
  <div class="page-wrap">

    <div class="controls">
      <div class="seg" id="bp-section-seg">
        <button data-section="all" class="active">All</button>
      </div>
      <span class="count" id="bp-count"></span>
    </div>

    <main id="bp-list-view"></main>
  </div>
</section>

<script type="application/json" id="data-beginners-priority">__BEGINNERS_PRIORITY_DATA__</script>

<!-- ::: PAGE SCRIPT ::: -->
<script>
(() => {
  const SLUG = 'beginners-priority';
  const ROOT = document.querySelector('.page-beginners-priority');
  const DATA = JSON.parse(document.getElementById('data-beginners-priority').textContent);

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function slugify(s) {
    return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }

  const sections = DATA.sections.map(s => ({ ...s, slug: slugify(s.title) }));
  const totalHeroes = sections.reduce((acc, s) => acc + s.heroes.length, 0);

  let initialized = false;
  let state = { section: 'all', hero: '' };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    state = { section: h.section || 'all', hero: h.hero || '' };
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.section !== 'all') out.section = state.section;
    if (state.hero) out.hero = state.hero;
    Omni.writePageHash(SLUG, out);
  }

  function starsHTML(h) {
    const parts = [];
    if (h.minimal_stars != null) {
      parts.push(`<span class="pair"><span class="lbl">Min</span><span class="val min">${h.minimal_stars}★</span></span>`);
    }
    if (h.ideal_stars != null) {
      parts.push(`<span class="pair"><span class="lbl">Ideal</span><span class="val ideal">${h.ideal_stars}★</span></span>`);
    }
    return parts.length ? `<span class="stars">${parts.join('')}</span>` : '';
  }

  function portraitHTML(h) {
    const safe = escapeHtml(initials(h.name));
    if (h.image) {
      return `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(h.name)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`;
    }
    return `<div class="initials">${safe}</div>`;
  }

  function pcardHTML(h) {
    return `<div class="pcard" data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}">
      <div class="portrait" data-open="${escapeHtml(h.name)}">${portraitHTML(h)}</div>
      <div class="body">
        <div class="row1">
          <span class="name" data-open="${escapeHtml(h.name)}">${escapeHtml(h.name)}</span>
          ${h.tag ? `<span class="tag">${escapeHtml(h.tag)}</span>` : ''}
          ${starsHTML(h)}
        </div>
        ${h.summary ? `<div class="summary">${escapeHtml(h.summary)}</div>` : ''}
        ${h.source ? `<div class="meta">
          <div class="chunk"><span class="k">Source</span><span class="v">${escapeHtml(h.source)}</span></div>
        </div>` : ''}
        ${h.notes ? `<div class="notes">${escapeHtml(h.notes)}</div>` : ''}
      </div>
    </div>`;
  }

  const listView = ROOT.querySelector('#bp-list-view');
  const countEl = ROOT.querySelector('#bp-count');

  function render() {
    let shown = 0;
    let html = '';
    for (const s of sections) {
      if (state.section !== 'all' && state.section !== s.slug) continue;
      const heroes = s.heroes;
      shown += heroes.length;
      html += `<section class="section">
        <div class="section-head">
          <h2>${escapeHtml(s.title)}</h2>
          <span class="pill">${heroes.length} hero${heroes.length === 1 ? '' : 'es'}</span>
        </div>`;
      if (s.intro) html += `<div class="section-intro">${escapeHtml(s.intro)}</div>`;
      html += `<div class="priority-list">${heroes.map(pcardHTML).join('')}</div>`;
      html += `</section>`;
    }
    if (!shown) {
      html = `<div class="empty-result">Không có hero nào khớp với bộ lọc hiện tại.</div>`;
    }
    listView.innerHTML = html;
    countEl.textContent = `${shown}/${totalHeroes} hero`;
  }

  function openHero(name) {
    if (!Omni.openProfile(name)) return;
    state.hero = name;
    syncHash();
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    const seg = ROOT.querySelector('#bp-section-seg');
    for (const s of sections) {
      const btn = document.createElement('button');
      btn.dataset.section = s.slug;
      btn.textContent = s.title.length > 28 ? s.title.slice(0, 26) + '…' : s.title;
      btn.title = s.title;
      seg.appendChild(btn);
    }

    seg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-section]');
      if (!btn) return;
      state.section = btn.dataset.section;
      for (const b of seg.querySelectorAll('button')) {
        b.classList.toggle('active', b === btn);
      }
      syncHash();
      render();
    });

    ROOT.addEventListener('click', e => {
      const opener = e.target.closest('[data-open]');
      if (opener) openHero(opener.dataset.open);
    });
    ROOT.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const pcard = e.target.closest('.pcard[data-name]');
      if (pcard) { e.preventDefault(); openHero(pcard.dataset.name); }
    });
  }

  function applyState() {
    const seg = ROOT.querySelector('#bp-section-seg');
    for (const b of seg.querySelectorAll('button')) {
      b.classList.toggle('active', b.dataset.section === state.section);
    }
    if (state.section !== 'all' && !sections.some(s => s.slug === state.section)) {
      state.section = 'all';
      for (const b of seg.querySelectorAll('button')) {
        b.classList.toggle('active', b.dataset.section === 'all');
      }
    }
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    applyState();
    render();
    if (state.hero) openHero(state.hero);
  });

  Omni.onModalClosed(() => {
    if (state.hero) {
      state.hero = '';
      syncHash();
    }
  });
})();
</script>
