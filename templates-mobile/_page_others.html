<!-- ::: PAGE FRAGMENT ::: -->
<style>
  /* Mobile "Others" — a container tab (right of Relics) that hosts small
     misc pages via a sub-tab bar (same idea as Relics = Priority + Tier List).
     For now it holds one small page: the Accessories Guide. The sub-tab bar
     stays hidden while there's a single page and appears automatically once a
     second is registered in SUBPAGES. All styles scoped under `.page-others`. */

  /* ── Sub-tab bar (shown only when 2+ small pages exist) ─────────────────── */
  .page-others .subtabs {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm);
    margin-bottom: 14px;
  }
  .page-others .subtabs.single { display: none }
  .page-others .subtabs button {
    background: var(--panel); border: 0; border-right: var(--border-w) solid var(--border);
    color: var(--body-color); font-family: var(--font-display); font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.4px; padding: 12px 10px; min-height: 46px;
    cursor: pointer; transition: background-color .12s ease, color .12s ease;
  }
  .page-others .subtabs button:last-child { border-right: 0 }
  .page-others .subtabs button.active { background: var(--ink); color: var(--on-dark) }

  /* ── Accessories guide ──────────────────────────────────────────────────── */
  .page-others .disclaimer {
    font-size: 12px; line-height: 1.5; color: var(--muted); font-style: italic;
    margin: 0 0 14px; border-left: 4px solid var(--c-amber); padding: 4px 0 4px 10px;
  }

  .page-others .section { margin-bottom: 24px }
  .page-others .section-head {
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    margin: 0 0 6px; padding: 8px 10px;
    background: var(--ink); color: var(--on-dark);
  }
  .page-others .section-head h2 {
    margin: 0; font-family: var(--font-display); font-size: 15px;
    text-transform: uppercase; letter-spacing: 0.3px; color: var(--on-dark); line-height: 1.15;
  }
  .page-others .section-note {
    color: var(--body-color); font-size: 12.5px; line-height: 1.5; font-weight: 500;
    margin: 0 0 10px; border-left: 5px solid var(--c-cyan); padding-left: 10px;
  }

  .page-others .stat-list { display: flex; flex-direction: column; gap: 10px }

  .page-others .scard {
    padding: 10px 11px; background: var(--panel);
    border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm);
    border-left-width: 6px;
  }
  .page-others .scard.v-priority    { border-left-color: var(--c-amber) }
  .page-others .scard.v-situational { border-left-color: var(--c-cyan) }
  .page-others .scard.v-skip        { border-left-color: var(--c-rose); opacity: 0.82 }

  .page-others .shead { display: flex; align-items: center; gap: 9px; flex-wrap: wrap }
  .page-others .sname {
    font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: 0.1px;
    overflow-wrap: anywhere; min-width: 0;
  }

  /* Rank chip for the ordered priorities (1st … 5th). */
  .page-others .rankbadge {
    font-family: var(--font-display); font-size: 13px; font-weight: 700;
    background: var(--c-amber); color: var(--ink);
    border: 2px solid var(--border); padding: 3px 9px; line-height: 1;
    text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap;
  }
  /* Verdict chip for the non-ranked stats. */
  .page-others .vchip {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    border: 2px solid var(--border); padding: 3px 8px; line-height: 1.15; white-space: nowrap;
    color: var(--ink);
  }
  .page-others .vchip.v-situational { background: var(--c-cyan) }
  .page-others .vchip.v-skip        { background: var(--c-rose); color: #fff }

  .page-others .advice {
    color: var(--body-color); font-size: 13.5px; line-height: 1.5;
    white-space: pre-wrap; overflow-wrap: anywhere; margin-top: 8px;
  }

  .page-others .example {
    display: flex; align-items: baseline; gap: 7px; margin-top: 8px;
    font-size: 12.5px; line-height: 1.45;
  }
  .page-others .example .lbl {
    text-transform: uppercase; letter-spacing: 0.06em; font-size: 9.5px;
    font-weight: 700; color: var(--muted); flex-shrink: 0;
  }
  .page-others .example .val { color: var(--body-color); font-weight: 600; overflow-wrap: anywhere }
</style>

<section class="page page-others" data-tab="others" hidden>
  <div class="page-wrap">
    <!-- One button per small page. Hidden (via .single) while there's only one. -->
    <div class="subtabs single" id="ot-subtabs" role="tablist" aria-label="Chọn trang"></div>
    <main id="ot-view"></main>
  </div>
</section>

<script type="application/json" id="data-accessories">__ACCESSORIES_DATA__</script>

<!-- ::: PAGE SCRIPT ::: -->
<script>
(() => {
  const SLUG = 'others';
  const ROOT = document.querySelector('.page-others');
  const ACCESSORIES = JSON.parse(document.getElementById('data-accessories').textContent);

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── Accessories Guide small page ─────────────────────────────────────────
  // Verdict buckets, in display order. `verdict` matches build_accessories.py.
  const GROUPS = [
    { verdict: 'priority',    title: 'Ưu tiên reroll (theo thứ tự)', note: 'Overall Order của tác giả — cao → thấp.' },
    { verdict: 'situational', title: 'Tuỳ tình huống',               note: 'Chỉ reroll khi đã xong hết các chỉ số ưu tiên.' },
    { verdict: 'skip',        title: 'Không cần thiết',              note: 'Bỏ qua — đừng lãng phí lượt reroll.' },
  ];

  function statCard(s) {
    const isPri = s.verdict === 'priority';
    const badge = isPri
      ? `<span class="rankbadge">${escapeHtml(s.order)}</span>`
      : (s.order ? `<span class="vchip v-${s.verdict}">${escapeHtml(s.order)}</span>` : '');
    return `<div class="scard v-${escapeHtml(s.verdict)}">
      <div class="shead">
        ${badge}
        <span class="sname">${escapeHtml(s.name)}</span>
      </div>
      ${s.advice ? `<div class="advice">${escapeHtml(s.advice)}</div>` : ''}
      ${s.example ? `<div class="example"><span class="lbl">VD / Ghi chú</span><span class="val">${escapeHtml(s.example)}</span></div>` : ''}
    </div>`;
  }

  function renderAccessories() {
    const stats = ACCESSORIES.stats || [];
    let html = `<div class="disclaimer">Tên chỉ số được suy ra từ icon trong sheet (icon không xuất ra được) — báo mình nếu có tên nào sai để sửa lại.</div>`;
    for (const g of GROUPS) {
      const items = stats.filter(s => s.verdict === g.verdict);
      if (!items.length) continue;
      html += `<section class="section">
        <div class="section-head"><h2>${escapeHtml(g.title)}</h2></div>
        <div class="section-note">${escapeHtml(g.note)}</div>
        <div class="stat-list">${items.map(statCard).join('')}</div>
      </section>`;
    }
    return html || `<div class="disclaimer">Chưa có dữ liệu.</div>`;
  }

  // ── Sub-page registry — add another entry to grow the "Others" menu ───────
  const SUBPAGES = [
    { key: 'accessories', label: 'Accessories', render: renderAccessories },
  ];

  const subtabsEl = ROOT.querySelector('#ot-subtabs');
  const viewEl = ROOT.querySelector('#ot-view');
  let initialized = false;
  let state = { sub: SUBPAGES[0].key };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    state.sub = SUBPAGES.some(p => p.key === h.sub) ? h.sub : SUBPAGES[0].key;
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.sub !== SUBPAGES[0].key) out.sub = state.sub;
    Omni.writePageHash(SLUG, out);
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    // A single-page menu hides its sub-tab bar; 2+ pages reveal it.
    subtabsEl.classList.toggle('single', SUBPAGES.length < 2);
    subtabsEl.innerHTML = SUBPAGES.map(p =>
      `<button data-sub="${escapeHtml(p.key)}" role="tab">${escapeHtml(p.label)}</button>`
    ).join('');

    subtabsEl.addEventListener('click', e => {
      const btn = e.target.closest('button[data-sub]');
      if (!btn || btn.dataset.sub === state.sub) return;
      state.sub = btn.dataset.sub;
      syncHash();
      renderActive();
    });
  }

  function renderActive() {
    for (const b of subtabsEl.querySelectorAll('button')) {
      b.classList.toggle('active', b.dataset.sub === state.sub);
    }
    const page = SUBPAGES.find(p => p.key === state.sub) || SUBPAGES[0];
    viewEl.innerHTML = page.render();
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    renderActive();
  });
})();
</script>
