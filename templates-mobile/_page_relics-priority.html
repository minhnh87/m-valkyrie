<style>

  /* Icon on top, name below, whole cell width-locked (see td.c-relic) so long

  .page-relics-priority .rt-relic {
    display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%;

  .page-relics-priority .rt-relic .ic {

  .page-relics-priority .rt-relic .ic img { width: 100%; height: 100%; object-fit: contain; display: block }
  .page-relics-priority .rt-relic .ic .initials {

<!-- ::: PAGE SCRIPT ::: -->
<script>
(() => {
  const SLUG = 'relics-priority';
  const ROOT = document.querySelector('.page-relics-priority');
  const DATA = JSON.parse(document.getElementById('data-relics-priority').textContent);
  const TIER = JSON.parse(document.getElementById('data-relics-tier').textContent);

  // Grade → rank for sorting a mode column (S+ best … D worst; blank last).
  const GRADE_RANK = { 'S+':9,'S':8,'S-':7,'A+':6,'A':5,'A-':4,'B':3,'C':2,'D':1 };
  function gradeRank(g){ return GRADE_RANK[(g||'').trim()] || 0; }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length || !parts[0]) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function slugify(s) {
    return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }
  // Short filter-chip labels for the four known sections; graceful fallback.
  function shortLabel(title) {
    const t = (title || '').toLowerCase();
    if (t.includes('justified')) return 'Justified';
    if (t.includes('rebates & extra')) return 'Rebates';
    if (t.includes('pvp road')) return 'PvP Road';
    if (t.includes('niche')) return 'Niche';
    return title.length > 16 ? title.slice(0, 15) + '…' : title;
  }
  function isSkip(notes) { return /don'?t\s*get\s*it/i.test(notes || ''); }

  // Focus column → badge class + label. "PvP > PvE" gets its own amber chip.
  function focusBadge(focus) {
    const f = (focus || '').trim();
    if (!f) return '';
    const key = f.toLowerCase();
    let cls = 'focus-both';
    if (key === 'pvp') cls = 'focus-pvp';
    else if (key === 'pve') cls = 'focus-pve';
    else if (key === 'both') cls = 'focus-both';
    else if (key.includes('>')) cls = 'focus-pvppve';
    return `<span class="badge ${cls}">${escapeHtml(f)}</span>`;
  }
  function spendBadge(spending) {
    const s = (spending || '').trim();
    if (!s) return '';
    const cls = /whale/i.test(s) ? 'spend-whale' : 'spend-justified';
    return `<span class="badge ${cls}">${escapeHtml(s)}</span>`;
  }

  // Render the breakpoints string, wrapping each number that the sheet coloured
  // red (carried in r.breakpoints_red) in a red span.
  function breaksHTML(r) {
    const txt = r.breakpoints || '';
    if (!txt) return '';
    const red = new Set(r.breakpoints_red || []);
    const html = escapeHtml(txt).replace(/\d+/g, n =>
      red.has(n) ? `<span class="num red">${n}</span>` : `<span class="num">${n}</span>`);
    return `<div class="breaks"><span class="lbl">★ Mốc</span><span class="val">${html}</span></div>`;
  }

  function iconHTML(r) {
    const safe = escapeHtml(initials(r.name));
    if (r.image) {
      return `<div class="ricon"><img loading="lazy" src="${escapeHtml(r.image)}" alt="${escapeHtml(r.name)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))"></div>`;
    }
    return `<div class="ricon"><div class="initials">${safe}</div></div>`;
  }

  function rcardHTML(r) {
    const skip = isSkip(r.notes);
    const skipBadge = skip ? `<span class="badge skip">Skip</span>` : '';
    const badges = focusBadge(r.focus) + spendBadge(r.spending) + skipBadge;
    const hasInfo = r.notes || r.source || r.breakpoints || r.focus || r.spending;
    return `<div class="rcard${skip ? ' skip' : ''}">
      ${iconHTML(r)}
      <div class="rbody">
        <div class="row1">
          <span class="name">${escapeHtml(r.name)}</span>
          ${badges ? `<span class="badges">${badges}</span>` : ''}
        </div>
        ${breaksHTML(r)}
        ${r.notes ? `<div class="notes${skip ? ' skip' : ''}">${escapeHtml(r.notes)}</div>` : ''}
        ${r.source ? `<div class="source"><span class="lbl">Nguồn</span><span class="val">${escapeHtml(r.source)}</span></div>` : ''}
        ${!hasInfo ? `<div class="tbd">Chưa cập nhật.</div>` : ''}
      </div>
    </div>`;
  }

  const sections = DATA.sections.map(s => ({ ...s, slug: slugify(s.title) }));
  const listView = ROOT.querySelector('#rl-list-view');

  let initialized = false;
  let state = { sub: 'priority', section: 'all', tsort: 'overall' };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    const sub = h.sub === 'tier' ? 'tier' : 'priority';
    const tsort = (h.tsort === 'overall' || TIER.columns.some(c => c.key === h.tsort))
      ? h.tsort : 'overall';
    state = { sub, section: h.section || 'all', tsort };
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.sub !== 'priority') out.sub = state.sub;
    if (state.section !== 'all') out.section = state.section;
    if (state.tsort !== 'overall') out.tsort = state.tsort;
    Omni.writePageHash(SLUG, out);
  }

  function render() {
    let shown = 0;
    let html = '';
    for (const s of sections) {
      if (state.section !== 'all' && state.section !== s.slug) continue;
      const relics = s.relics;
      if (!relics.length) continue;
      shown += relics.length;
      html += `<section class="section">
        <div class="section-head"><h2>${escapeHtml(s.title)}</h2></div>`;
      if (s.subtitle) html += `<div class="section-note">${escapeHtml(s.subtitle)}</div>`;
      html += `<div class="relic-list">${relics.map(rcardHTML).join('')}</div>`;
      html += `</section>`;
    }
    if (!shown) {
      html += `<div class="empty-result">Không có relic nào khớp với bộ lọc hiện tại.</div>`;
    }
    listView.innerHTML = html;
  }

  // ── Tier List view ───────────────────────────────────────────────────────
  const tableView = ROOT.querySelector('#rt-table-view');

  function gradeCellHTML(g) {
    const v = (g || '').trim();
    if (!v) return `<td class="g-cell"><span class="g empty">–</span></td>`;
    return `<td class="g-cell"><span class="g" style="background:${Omni.tierColor(v)}">${escapeHtml(v)}</span></td>`;
  }

  function tierIconHTML(r) {
    const safe = escapeHtml(initials(r.name));
    const inner = r.image
      ? `<img loading="lazy" src="${escapeHtml(r.image)}" alt=""
          onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`
      : `<div class="initials">${safe}</div>`;
    return `<span class="ic">${inner}</span>`;
  }

  // Overall = numeric desc; a mode = grade rank desc, then overall as tie-break.
  // Stable via the original index so equal keys keep the sheet's ranking.
  function sortedRelics() {
    const key = state.tsort;
    const ov = x => parseFloat(x.r.overall) || 0;
    const arr = TIER.relics.map((r, i) => ({ r, i }));
    if (key === 'overall') {
      arr.sort((a, b) => ov(b) - ov(a) || a.i - b.i);
    } else {
      arr.sort((a, b) =>
        gradeRank(b.r.grades[key]) - gradeRank(a.r.grades[key]) || ov(b) - ov(a) || a.i - b.i);
    }
    return arr.map(x => x.r);
  }

  function renderTier() {
    const cols = TIER.columns;
    const head = cols.map(c =>
      `<th class="g-cell${state.tsort === c.key ? ' sorted' : ''}" data-sort="${c.key}" title="${escapeHtml(c.label)}">${escapeHtml(c.short)}</th>`
    ).join('');
    const rows = sortedRelics().map(r => {
      const grades = cols.map(c => gradeCellHTML(r.grades[c.key])).join('');
      return `<tr data-name="${escapeHtml(r.name)}">
        <td class="c-relic"><div class="rt-relic">${tierIconHTML(r)}<span class="nm">${escapeHtml(r.name)}</span></div></td>
        ${grades}
      </tr>`;
    }).join('');
    tableView.innerHTML = `<div class="rt-scroll"><table class="rt-table">
      <thead><tr><th class="c-relic">Relic</th>${head}</tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  function setSort(key) {
    if (key !== 'overall' && !TIER.columns.some(c => c.key === key)) return;
    state.tsort = key;
    setActiveBtn(ROOT.querySelector('#rt-sort-seg'), b => b.dataset.sort === key);
    syncHash();
    renderTier();
  }

  function openRelicDetail(name) {
    const r = TIER.relics.find(x => x.name === name);
    if (!r) return;
    const safe = escapeHtml(initials(r.name));
    const port = r.image
      ? `<img src="${escapeHtml(r.image)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`
      : `<div class="initials">${safe}</div>`;
    const badges = r.overall ? `<div class="badges"><span class="pill score">Overall ${escapeHtml(r.overall)}</span></div>` : '';
    const grid = TIER.columns.map(c => {
      const v = (r.grades[c.key] || '').trim();
      const chip = v
        ? `<span class="tchip" style="background:${Omni.tierColor(v)}">${escapeHtml(v)}</span>`
        : `<span class="tchip empty">–</span>`;
      return `<div class="gcell"><span class="k">${escapeHtml(c.label)}</span>${chip}</div>`;
    }).join('');
    const stars = [];
    if (r.min_star) stars.push(`<div class="sbox"><span class="k">Min ★</span>${escapeHtml(r.min_star)}</div>`);
    if (r.ideal_star) stars.push(`<div class="sbox"><span class="k">Ideal ★</span>${escapeHtml(r.ideal_star)}</div>`);
    const note = r.note
      ? `<div class="block">${escapeHtml(r.note)}</div>`
      : `<div class="block empty">Chưa có ghi chú.</div>`;
    Omni.openModal(`
      <header>
        <div class="portrait">${port}</div>
        <div>
          <h2 id="omni-modal-title">${escapeHtml(r.name)}</h2>
          ${badges}
        </div>
        <button class="close" aria-label="Close">×</button>
      </header>
      <div class="body"><div class="rt-detail">
        <h3>Grades theo chế độ</h3>
        <div class="rt-grades">${grid}</div>
        ${stars.length ? `<h3>Mốc sao</h3><div class="stars">${stars.join('')}</div>` : ''}
        <h3>Ghi chú</h3>${note}
      </div></div>`);
  }

  function applySub() {
    setActiveBtn(ROOT.querySelector('#rl-subtabs'), b => b.dataset.sub === state.sub);
    for (const p of ROOT.querySelectorAll('.subpanel')) p.hidden = p.dataset.panel !== state.sub;
    if (state.sub === 'tier') renderTier();
    else render();
  }

  function setActiveBtn(seg, predicate) {
    for (const b of seg.querySelectorAll('button')) b.classList.toggle('active', predicate(b));
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    const seg = ROOT.querySelector('#rl-section-seg');
    for (const s of sections) {
      const btn = document.createElement('button');
      btn.dataset.section = s.slug;
      btn.textContent = shortLabel(s.title);
      btn.title = s.title;
      seg.appendChild(btn);
    }

    seg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-section]');
      if (!btn) return;
      state.section = btn.dataset.section;
      setActiveBtn(seg, b => b === btn);
      syncHash();
      render();
    });

    // Sub-tab switch (Priority | Tier List)
    ROOT.querySelector('#rl-subtabs').addEventListener('click', e => {
      const btn = e.target.closest('button[data-sub]');
      if (!btn || btn.dataset.sub === state.sub) return;
      state.sub = btn.dataset.sub;
      syncHash();
      applySub();
    });

    // Tier sort control — Overall (static) + one chip per mode column.
    const sortSeg = ROOT.querySelector('#rt-sort-seg');
    for (const c of TIER.columns) {
      const btn = document.createElement('button');
      btn.dataset.sort = c.key;
      btn.textContent = c.short;
      btn.title = 'Sắp theo ' + c.label;
      sortSeg.appendChild(btn);
    }
    sortSeg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-sort]');
      if (btn) setSort(btn.dataset.sort);
    });

    // Tier table: tap a mode header to sort, tap a row to open its detail.
    tableView.addEventListener('click', e => {
      const th = e.target.closest('th[data-sort]');
      if (th) { setSort(th.dataset.sort); return; }
      const tr = e.target.closest('tr[data-name]');
      if (tr) openRelicDetail(tr.dataset.name);
    });
  }

  function applyState() {
    const seg = ROOT.querySelector('#rl-section-seg');
    setActiveBtn(seg, b => b.dataset.section === state.section);
    if (state.section !== 'all' && !sections.some(s => s.slug === state.section)) {
      state.section = 'all';
      setActiveBtn(seg, b => b.dataset.section === 'all');
    }
    setActiveBtn(ROOT.querySelector('#rt-sort-seg'), b => b.dataset.sort === state.tsort);
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    applyState();
    applySub();
  });
})();
</script>
