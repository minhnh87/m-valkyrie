<!-- ::: PAGE FRAGMENT ::: -->
<style>
  /* All selectors scoped under .page-endgame-priority to avoid cross-tab
     collisions. Hero clicks open the shared profile modal (Omni.openProfile),
     styled by .omni-profile in the shell — no per-page modal CSS here.
     .page-wrap width inherits the shell default (1400px) for cross-tab consistency. */

  .page-endgame-priority .section { margin-bottom: 44px }
  .page-endgame-priority .section-head {
    display: flex; align-items: center; gap: 12px;
    margin: 4px 0 16px; padding-bottom: 10px;
    border-bottom: 1px solid var(--hairline);
  }
  .page-endgame-priority .section-head .tier-chip {
    display: inline-block;
    background: var(--tier-color, var(--surface-strong));
    color: var(--ink); font-weight: 600; font-size: 11px;
    padding: 4px 12px; border-radius: 999px;
    letter-spacing: 0.04em;
  }
  .page-endgame-priority .section-head h2 {
    margin: 0; font-size: 18px; font-weight: 400; letter-spacing: -0.2px;
    color: var(--body-color);
  }
  .page-endgame-priority .section-head .pill {
    background: var(--canvas-soft); border: 1px solid var(--hairline);
    color: var(--body-color); font-size: 11px; padding: 3px 9px;
    border-radius: 999px;
  }

  .page-endgame-priority .priority-list { display: flex; flex-direction: column; gap: 10px }
  .page-endgame-priority .pcard {
    display: grid;
    grid-template-columns: 44px 96px 1fr;
    gap: 16px;
    transition: border-color .12s ease;
    width: 900px;
  }
  .page-endgame-priority .pcard:hover {
    border-color: var(--hairline-strong);
    border-left-color: var(--tier-color, var(--ink));
  }
  .page-endgame-priority .pcard:focus-visible {
    outline: 2px solid var(--primary); outline-offset: 2px;
  }
  .page-endgame-priority .pcard .rank {
    display: grid; place-items: center;
    font-family: var(--font-mono);
    font-size: 22px; font-weight: 400; color: var(--muted-soft);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .page-endgame-priority .pcard .portrait {
    width: 96px; height: 96px; border-radius: 10px; overflow: hidden;
    background: var(--canvas-soft);
    border: 1px solid var(--hairline);
    cursor: pointer;
  }
  .page-endgame-priority .pcard .portrait img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .page-endgame-priority .pcard .portrait .initials {
    width: 100%; height: 100%; display: grid; place-items: center;
    font-weight: 500; font-size: 28px; color: var(--ink);
    background: linear-gradient(135deg,
      color-mix(in srgb, var(--tier-color, var(--surface-strong)) 40%, var(--canvas-soft)),
      color-mix(in srgb, var(--tier-color, var(--surface-strong)) 14%, var(--canvas-soft)));
    letter-spacing: -0.5px;
  }
  .page-endgame-priority .pcard .body { min-width: 0 }
  .page-endgame-priority .pcard .row1 {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 4px;
  }
  .page-endgame-priority .pcard .name {
    font-size: 17px; font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--ink);
    cursor: pointer;
  }
  .page-endgame-priority .pcard .name:hover { color: var(--primary) }
  .page-endgame-priority .pcard .tier-badge {
    background: color-mix(in srgb, var(--tier-color, var(--surface-strong)) 30%, var(--surface-card));
    color: var(--ink);
    border: 1px solid color-mix(in srgb, var(--tier-color, var(--hairline-strong)) 60%, var(--hairline));
    font-size: 11px; padding: 3px 9px; border-radius: 999px;
    font-weight: 500; letter-spacing: 0.02em;
  }
  .page-endgame-priority .pcard .fair {
    display: inline-flex; align-items: center; gap: 6px;
    margin-left: auto;
    font-size: 11px; color: var(--muted);
  }
  .page-endgame-priority .pcard .fair .lbl {
    text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; font-weight: 600;
  }
  .page-endgame-priority .pcard .fair .val {
    color: var(--ink); font-weight: 500; font-size: 12px;
    font-family: var(--font-mono);
    background: var(--canvas-soft);
    border: 1px solid color-mix(in srgb, var(--tier-color, var(--hairline-strong)) 45%, var(--hairline));
    border-radius: 999px; padding: 2px 10px;
    font-variant-numeric: tabular-nums;
    white-space: pre-wrap;
  }
  .page-endgame-priority .pcard .summary {
    color: var(--body-color); font-size: 14px; line-height: 1.55;
    white-space: pre-wrap; margin-top: 6px;
  }
  .page-endgame-priority .pcard .meta {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 12px; font-size: 12px;
  }
  .page-endgame-priority .pcard .meta .chunk {
    display: flex; gap: 8px; align-items: flex-start; min-width: 0;
  }
  .page-endgame-priority .pcard .meta .chunk .k {
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; font-size: 10px; font-weight: 600;
    padding-top: 2px; white-space: nowrap;
  }
  .page-endgame-priority .pcard .meta .chunk .v {
    color: var(--body-color); white-space: pre-wrap;
    line-height: 1.5;
  }

  .page-endgame-priority .empty-result {
    text-align: center; color: var(--muted);
    padding: 48px; font-style: italic;
  }

  @media (max-width: 640px) {
    .page-endgame-priority .pcard {
      grid-template-columns: 36px 72px 1fr;
      gap: 12px; padding: 14px;
    }
    .page-endgame-priority .pcard .portrait { width: 72px; height: 72px }
    .page-endgame-priority .pcard .rank { font-size: 18px }
    .page-endgame-priority .pcard .fair { margin-left: 0; width: 100% }
  }
</style>

<section class="page page-endgame-priority" data-tab="endgame-priority" hidden>
  <div class="page-wrap">

    <div class="controls">
      <div class="seg" id="ep-section-seg">
        <button data-section="all" class="active">All</button>
      </div>
      <span class="count" id="ep-count"></span>
    </div>

    <main id="ep-list-view"></main>
  </div>
</section>

<script type="application/json" id="data-endgame-priority">__ENDGAME_PRIORITY_DATA__</script>

<!-- ::: PAGE SCRIPT ::: -->
<script>
(() => {
  const SLUG = 'endgame-priority';
  const ROOT = document.querySelector('.page-endgame-priority');
  const DATA = JSON.parse(document.getElementById('data-endgame-priority').textContent);

  // Map priority tier label → CSS var on the shared palette.
  const TIER_COLORS = {
    'Top Priority':  'var(--t-ss)',
    'High':          'var(--t-s)',
    'Middle - High': 'var(--t-sm)',
    'Middle':        'var(--t-a)',
    'Low':           'var(--t-b)',
  };

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts * 1000).toISOString().slice(0, 10);
  }
  function slugify(s) {
    return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }
  function tierColor(title) {
    return TIER_COLORS[title] || 'var(--accent)';
  }

  const sections = DATA.sections.map(s => ({
    ...s,
    slug: slugify(s.title),
    color: tierColor(s.title),
  }));
  const totalHeroes = sections.reduce((acc, s) => acc + s.heroes.length, 0);

  let initialized = false;
  let state = { section: 'all', hero: '' };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    state = {
      section: h.section || 'all',
      hero: h.hero || '',
    };
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.section !== 'all') out.section = state.section;
    if (state.hero) out.hero = state.hero;
    Omni.writePageHash(SLUG, out);
  }

  function portraitHTML(h) {
    const safe = escapeHtml(initials(h.name));
    if (h.image) {
      return `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(h.name)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`;
    }
    return `<div class="initials">${safe}</div>`;
  }

  function pcardHTML(h, sectionTitle) {
    return `<div class="pcard" data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}">
      <div class="rank">${h.rank}</div>
      <div class="portrait" data-open="${escapeHtml(h.name)}">${portraitHTML(h)}</div>
      <div class="body">
        <div class="row1">
          <span class="name" data-open="${escapeHtml(h.name)}">${escapeHtml(h.name)}</span>
          <span class="tier-badge">${escapeHtml(sectionTitle)}</span>
          ${h.fair_stars ? `<span class="fair"><span class="lbl">Fair ★</span><span class="val">${escapeHtml(h.fair_stars)}</span></span>` : ''}
        </div>
        ${h.summary ? `<div class="summary">${escapeHtml(h.summary)}</div>` : ''}
        ${h.source ? `<div class="meta">
          <div class="chunk"><span class="k">Source</span><span class="v">${escapeHtml(h.source)}</span></div>
        </div>` : ''}
      </div>
    </div>`;
  }

  const listView = ROOT.querySelector('#ep-list-view');
  const countEl = ROOT.querySelector('#ep-count');

  function render() {
    let shown = 0;
    let html = '';
    for (const s of sections) {
      if (state.section !== 'all' && state.section !== s.slug) continue;
      const heroes = s.heroes;
      shown += heroes.length;
      html += `<section class="section" style="--tier-color: ${s.color}">
        <div class="section-head">
          <span class="tier-chip">${escapeHtml(s.title)}</span>
          <h2>${heroes.length} hero${heroes.length === 1 ? '' : 'es'}</h2>
        </div>`;
      html += `<div class="priority-list">${heroes.map(h => pcardHTML(h, s.title)).join('')}</div>`;
      html += `</section>`;
    }
    if (!shown) {
      html = `<div class="empty-result">Không có hero nào khớp với bộ lọc hiện tại.</div>`;
    }
    listView.innerHTML = html;
    countEl.textContent = `${shown}/${totalHeroes} hero`;
  }

  // Delegate to the shared profile modal; keep this page's hash ownership so
  // the hero reopens on tab re-activation / reload.
  function openHero(name) {
    if (!Omni.openProfile(name)) return;
    state.hero = name;
    syncHash();
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;


    // section seg buttons (after the default "All")
    const seg = ROOT.querySelector('#ep-section-seg');
    for (const s of sections) {
      const btn = document.createElement('button');
      btn.dataset.section = s.slug;
      btn.textContent = s.title.length > 28 ? s.title.slice(0, 26) + '…' : s.title;
      btn.title = s.title;
      seg.appendChild(btn);
    }

    // input listeners
    seg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-section]');
      if (!btn) return;
      state.section = btn.dataset.section;
      for (const b of seg.querySelectorAll('button')) {
        b.classList.toggle('active', b === btn);
      }
      syncHash();
      render();
    });

    // open hero modal when card/portrait/name clicked
    ROOT.addEventListener('click', e => {
      const opener = e.target.closest('[data-open]');
      if (opener) openHero(opener.dataset.open);
    });
    // keyboard: Enter/Space on a focused card opens the profile
    ROOT.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const pcard = e.target.closest('.pcard[data-name]');
      if (pcard) { e.preventDefault(); openHero(pcard.dataset.name); }
    });
  }

  function applyState() {
    const seg = ROOT.querySelector('#ep-section-seg');
    for (const b of seg.querySelectorAll('button')) {
      b.classList.toggle('active', b.dataset.section === state.section);
    }
    if (state.section !== 'all' && !sections.some(s => s.slug === state.section)) {
      state.section = 'all';
      for (const b of seg.querySelectorAll('button')) {
        b.classList.toggle('active', b.dataset.section === 'all');
      }
    }
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    applyState();
    render();
    if (state.hero) {
      openHero(state.hero);
    }
  });

  Omni.onModalClosed(() => {
    if (state.hero) {
      state.hero = '';
      syncHash();
    }
  });
})();
</script>
