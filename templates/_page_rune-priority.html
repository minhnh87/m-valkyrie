<!-- ::: PAGE FRAGMENT ::: -->
<style>
  /* All selectors scoped under .page-rune-priority to avoid cross-tab collisions.
     IDs use the rp- prefix. Each tier is a flat row of hero portraits sorted
     left→right by their column in the source spreadsheet. Each portrait's
     border color (red/orange/yellow/gray) conveys priority — same encoding
     the source sheet uses around each image. */

  .page-rune-priority {
    /* Priority ring colors. Var names keep the source sheet's category keys
       (--rp-red / --rp-orange / --rp-yellow), but the site re-themes them:
       "red" category = purple, "orange" category = orange, "yellow" category =
       cyan; skip = muted neutral. The three hues (272° / 21° / 186°) are far
       apart so no two rings read as the same color. */
    --rp-red:    #8e3fd7;
    --rp-orange: #e8743a;
    --rp-yellow: #15b8c9;
    --rp-skip:   #a09c92;
  }

  .page-rune-priority .legend {
    display: flex; gap: 10px; flex-wrap: wrap;
    color: var(--body-color); font-size: 12px;
  }
  .page-rune-priority .legend .pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--canvas-soft); border: 1px solid var(--hairline);
    padding: 4px 11px 4px 9px; border-radius: 999px;
    font-weight: 500;
  }
  .page-rune-priority .legend .swatch {
    width: 10px; height: 10px; border-radius: 999px;
    background: var(--c, var(--muted));
  }

  .page-rune-priority .tiers { display: flex; flex-direction: column; gap: 14px }

  .page-rune-priority .tier {
    padding: 18px 20px;
    transition: border-color .12s ease;
  }
  .page-rune-priority .tier:hover { border-color: var(--hairline-strong) }

  .page-rune-priority .tier-head {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .page-rune-priority .tier-head h2 {
    margin: 0; font-size: 18px; font-weight: 400;
    letter-spacing: -0.2px;
    color: var(--ink);
  }
  .page-rune-priority .tier-head .count {
    color: var(--muted); font-size: 12px;
    font-family: var(--font-mono);
    margin: 0; /* override .controls .count's margin-left:auto leak */
  }

  .page-rune-priority .tier-notes {
    white-space: pre-line; margin: 0 0 16px;
    max-width: 960px;
  }

  .page-rune-priority .portraits {
    display: flex; gap: 10px; flex-wrap: wrap;
  }

  /* Portrait = circular avatar with a thick colored ring driven by --c
     (set inline per element from the priority key). Falls back to a faint
     neutral border when no priority is matched. */
  .page-rune-priority .portrait {
    --pad: 3px;
    width: 73px; height: 73px;
    border-radius: 999px; overflow: hidden;
    background: var(--canvas-soft);
    flex-shrink: 0;
    box-shadow: 0 0 0 var(--pad) var(--c, var(--hairline-strong));
    transition: transform .12s ease;
    cursor: default;
    /* inset margin so the ring isn't clipped by neighbor gap */
    margin: var(--pad);
  }
  .page-rune-priority .portrait[data-name] { cursor: pointer }
  .page-rune-priority .portrait:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px }
  .page-rune-priority .portrait:hover { transform: scale(1.08); }
  .page-rune-priority .portrait img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .page-rune-priority .portrait .initials {
    width: 100%; height: 100%; display: grid; place-items: center;
    font-weight: 500; font-size: 18px; color: var(--ink);
    background: linear-gradient(135deg, var(--surface-strong), var(--canvas-soft));
    letter-spacing: -0.5px;
  }

  @media (max-width: 720px) {
    .page-rune-priority .tier { padding: 14px }
    .page-rune-priority .portrait { width: 62px; height: 62px }
  }
</style>

<section class="page page-rune-priority" data-tab="rune-priority" hidden>
  <div class="page-wrap">

    <div class="controls">
      <div class="legend" id="rp-legend"></div>
    </div>

    <div class="tiers" id="rp-tiers"></div>
  </div>
</section>

<script type="application/json" id="data-rune-priority">__RUNE_PRIORITY_DATA__</script>

<!-- ::: PAGE SCRIPT ::: -->
<script>
(() => {
  const SLUG = 'rune-priority';
  const ROOT = document.querySelector('.page-rune-priority');
  const DATA = JSON.parse(document.getElementById('data-rune-priority').textContent);

  // Priority key → CSS custom property for its border color (declared in page scope).
  const PRIORITY_COLOR = {
    red:    'var(--rp-red)',
    orange: 'var(--rp-orange)',
    yellow: 'var(--rp-yellow)',
    skip:   'var(--rp-skip)',
  };

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts * 1000).toISOString().slice(0, 10);
  }

  function portraitInnerHTML(h) {
    const display = h.name || '?';
    const safe = escapeHtml(initials(display));
    if (h.image) {
      return `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(display)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`;
    }
    return `<div class="initials">${safe}</div>`;
  }

  function portraitHTML(h) {
    const color = PRIORITY_COLOR[h.priority] || 'var(--border-strong)';
    const title = h.name ? `${h.name}${h.priority ? ' · ' + h.priority : ''}` : 'unidentified';
    // Named anchors carry data-name (resolved to a character by openProfile's
    // alias lookup) and are keyboard-operable; unidentified image-only anchors
    // stay non-interactive.
    const nameAttr = h.name
      ? ` data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}"`
      : '';
    return `<div class="portrait"${nameAttr} style="--c:${color}" title="${escapeHtml(title)}">${portraitInnerHTML(h)}</div>`;
  }

  function tierHTML(t) {
    const total = t.heroes.length;
    return `<section class="tier" data-row="${t.row}">
      <strong>${escapeHtml(t.label)}</strong>
      ${t.notes ? `<div class="tier-notes">${escapeHtml(t.notes)}</div>` : ''}
      <div class="portraits">${t.heroes.map(portraitHTML).join('')}</div>
    </section>`;
  }

  function legendHTML() {
    return DATA.priorities.map(s => {
      const color = PRIORITY_COLOR[s.key] || 'var(--text-faint)';
      return `<span class="pill"><span class="swatch" style="--c:${color}"></span>${escapeHtml(s.label)}</span>`;
    }).join('');
  }

  let initialized = false;
  let state = { hero: '' };

  function isActive() { return Omni.getActivePage() === SLUG; }
  function readState() {
    if (!isActive()) return;
    state.hero = Omni.readPageHash().hero || '';
  }
  function syncHash() {
    if (!isActive()) return;
    Omni.writePageHash(SLUG, state.hero ? { hero: state.hero } : {});
  }

  // Delegate to the shared profile modal; remember the hero for reopen.
  function openHero(name) {
    if (!Omni.openProfile(name)) return;
    state.hero = name;
    syncHash();
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;
    ROOT.querySelector('#rp-legend').innerHTML = legendHTML();
    const tiersEl = ROOT.querySelector('#rp-tiers');
    tiersEl.innerHTML = DATA.tiers.map(tierHTML).join('');

    // Click (or Enter/Space on a focused portrait) → open the shared profile.
    // Duplicate portraits of the same hero both open the same character.
    tiersEl.addEventListener('click', e => {
      const p = e.target.closest('.portrait[data-name]');
      if (p && p.dataset.name) openHero(p.dataset.name);
    });
    tiersEl.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const p = e.target.closest('.portrait[data-name]');
      if (p && p.dataset.name) { e.preventDefault(); openHero(p.dataset.name); }
    });
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    if (state.hero) openHero(state.hero);
  });

  // Clear hero state when the shared modal is closed.
  Omni.onModalClosed(() => {
    if (state.hero) {
      state.hero = '';
      syncHash();
    }
  });
})();
</script>
