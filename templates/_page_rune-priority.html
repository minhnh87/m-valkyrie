<!-- ::: PAGE FRAGMENT ::: -->
<style>
  /* All selectors scoped under .page-rune-priority to avoid cross-tab collisions.
     IDs use the rp- prefix. Each tier is a flat row of hero portraits sorted
     left→right by their column in the source spreadsheet. Each portrait's
     border color (red/orange/yellow/gray) conveys priority — same encoding
     the source sheet uses around each image. */

  .page-rune-priority {
    --rp-red:       #ff4d4d;   /* Red Border · 4 Legendary (highest priority) */
    --rp-orange:    #ff9933;   /* Orange Border · 2 Epic 2 Legendary */
    --rp-yellow:    #ffd54a;   /* Yellow Border · 4 Epic (lowest priority) */
    --rp-skip:      #9aa0a6;   /* No Priority · Skip (gray) */
  }

  .page-rune-priority .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    color: var(--text-dim); font-size: 12px;
  }
  .page-rune-priority .legend .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg-2); border: 1px solid var(--border);
    padding: 3px 10px 3px 8px; border-radius: 999px;
  }
  .page-rune-priority .legend .swatch {
    width: 10px; height: 10px; border-radius: 3px;
    background: var(--c, var(--text-faint));
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--c, var(--text-faint)) 35%, transparent);
  }

  .page-rune-priority .tiers { display: flex; flex-direction: column; gap: 16px }

  .page-rune-priority .tier {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  .page-rune-priority .tier:hover { border-color: var(--border-strong) }

  .page-rune-priority .tier-head {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .page-rune-priority .tier-head h2 {
    margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.2px;
    color: var(--text);
  }
  .page-rune-priority .tier-head .count {
    color: var(--text-faint); font-size: 12px;
    margin: 0; /* override .controls .count's margin-left:auto leak */
  }

  .page-rune-priority .tier-notes {
    color: var(--text-dim); font-size: 13px; line-height: 1.55;
    background: var(--bg-2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent-2);
    border-radius: 10px; padding: 10px 12px;
    white-space: pre-line; margin: -2px 0 14px;
    max-width: 960px;
  }

  .page-rune-priority .portraits {
    display: flex; gap: 10px; flex-wrap: wrap;
  }

  /* Portrait = circular avatar with a thick colored ring driven by --c
     (set inline per element from the priority key). Falls back to a faint
     neutral border when no priority is matched. */
  .page-rune-priority .portrait {
    --pad: 3px;
    width: 56px; height: 56px;
    border-radius: 999px; overflow: hidden;
    background: linear-gradient(135deg, var(--bg-3), var(--bg-1));
    flex-shrink: 0;
    box-shadow: 0 0 0 var(--pad) var(--c, var(--border-strong)),
                0 1px 2px rgba(0,0,0,.4);
    transition: transform .12s ease;
    cursor: default;
    /* inset margin so the ring isn't clipped by neighbor gap */
    margin: var(--pad);
  }
  .page-rune-priority .portrait:hover { transform: scale(1.08); }
  .page-rune-priority .portrait img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .page-rune-priority .portrait .initials {
    width: 100%; height: 100%; display: grid; place-items: center;
    font-weight: 700; font-size: 18px; color: var(--text);
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    letter-spacing: -0.5px;
  }

  @media (max-width: 720px) {
    .page-rune-priority .tier { padding: 14px }
    .page-rune-priority .portrait { width: 48px; height: 48px }
  }
</style>

<section class="page page-rune-priority" data-tab="rune-priority" hidden>
  <div class="page-wrap">
    <header class="page-header">
      <div class="title">
        <h1>Rune Priority List</h1>
        <div class="sub">Heroes nào nên ưu tiên đầu tư rune — phân theo độ "đáng đầu tư" (tier) và border màu (priority: <span style="color:var(--rp-red)">đỏ</span> &gt; <span style="color:var(--rp-orange)">cam</span> &gt; <span style="color:var(--rp-yellow)">vàng</span>).</div>
      </div>
      <div class="meta">
        <div><strong id="rp-hero-count">…</strong> hero anchors · <a id="rp-src-link" href="#" target="_blank" rel="noreferrer noopener">this tab ↗</a></div>
        <div id="rp-fetched-at">…</div>
      </div>
    </header>

    <div class="controls">
      <div class="legend" id="rp-legend"></div>
    </div>

    <div class="tiers" id="rp-tiers"></div>
  </div>
</section>

<script type="application/json" id="data-rune-priority">__RUNE_PRIORITY_DATA__</script>

<!-- ::: PAGE SCRIPT ::: -->
<script>
(() => {
  const SLUG = 'rune-priority';
  const ROOT = document.querySelector('.page-rune-priority');
  const DATA = JSON.parse(document.getElementById('data-rune-priority').textContent);

  // Priority key → CSS custom property for its border color (declared in page scope).
  const PRIORITY_COLOR = {
    red:    'var(--rp-red)',
    orange: 'var(--rp-orange)',
    yellow: 'var(--rp-yellow)',
    skip:   'var(--rp-skip)',
  };

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts * 1000).toISOString().slice(0, 10);
  }

  function portraitInnerHTML(h) {
    const display = h.name || '?';
    const safe = escapeHtml(initials(display));
    if (h.image) {
      return `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(display)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`;
    }
    return `<div class="initials">${safe}</div>`;
  }

  function portraitHTML(h) {
    const color = PRIORITY_COLOR[h.priority] || 'var(--border-strong)';
    const title = h.name ? `${h.name}${h.priority ? ' · ' + h.priority : ''}` : 'unidentified';
    return `<div class="portrait" style="--c:${color}" title="${escapeHtml(title)}">${portraitInnerHTML(h)}</div>`;
  }

  function tierHTML(t) {
    const total = t.heroes.length;
    return `<section class="tier" data-row="${t.row}">
      <header class="tier-head">
        <h2>${escapeHtml(t.label)}</h2>
        <span class="count">${total} hero${total === 1 ? '' : 'es'}</span>
      </header>
      ${t.notes ? `<div class="tier-notes">${escapeHtml(t.notes)}</div>` : ''}
      <div class="portraits">${t.heroes.map(portraitHTML).join('')}</div>
    </section>`;
  }

  function legendHTML() {
    return DATA.priorities.map(s => {
      const color = PRIORITY_COLOR[s.key] || 'var(--text-faint)';
      return `<span class="pill"><span class="swatch" style="--c:${color}"></span>${escapeHtml(s.label)}</span>`;
    }).join('');
  }

  let initialized = false;

  Omni.onTab(SLUG, () => {
    if (!initialized) {
      initialized = true;
      ROOT.querySelector('#rp-hero-count').textContent = DATA.stats.hero_anchor_count;
      ROOT.querySelector('#rp-src-link').href = DATA.source || '#';
      const fetched = fmtDate(DATA.fetched_at);
      ROOT.querySelector('#rp-fetched-at').textContent = fetched ? `last sync: ${fetched}` : '';
      ROOT.querySelector('#rp-legend').innerHTML = legendHTML();
      ROOT.querySelector('#rp-tiers').innerHTML = DATA.tiers.map(tierHTML).join('');
    }
  });
})();
</script>
