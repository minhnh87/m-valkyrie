<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<!-- Standalone (Home Screen) app: launch fullscreen, no browser chrome. iOS only
     enters this mode when the shortcut is (re)created AFTER these tags ship. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Omniheroes">
<title>Omniheroes · Mobile</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     Omniheroes — MOBILE-FIRST build.
     Neubrutalist / vibrant: sharp corners (radius 0), hard 2-3px black
     borders, hard offset shadows, flat saturated colors, bold legible type,
     modest padding. Fixed bottom tab bar. Dense data stays fully visible via
     horizontal-scroll wrappers with sticky hero column + header.
     Per-page styles live in each page fragment, scoped under `.page-<slug>`.
     ============================================================ */
  :root {
    /* Surfaces — light canvas so vivid accents + black borders pop. */
    --canvas: #f4f4f0;
    --panel: #ffffff;
    --panel-soft: #fbfbf8;
    --panel-strong: #ececE6;

    /* Ink — near-black for maximum legibility (≥7:1 everywhere). */
    --ink: #0a0a0a;
    --body-color: #1d1d1b;
    --muted: #4a4a46;        /* still high-contrast, never washed-out */
    --muted-soft: #6f6f69;
    --on-dark: #ffffff;

    /* Hard structure */
    --border: #0a0a0a;
    --border-w: 2px;
    --border-w-strong: 3px;
    --shadow: 4px 4px 0 #0a0a0a;
    --shadow-sm: 3px 3px 0 #0a0a0a;

    /* Vivid accent palette (colorful, not pale) */
    --c-violet: #7c3aed;
    --c-rose:   #ff2d55;
    --c-orange: #ff6d00;
    --c-amber:  #ffc400;
    --c-lime:   #aeea00;
    --c-green:  #00c853;
    --c-cyan:   #00b8d4;
    --c-blue:   #2962ff;

    --primary: #7c3aed;        /* brand / focus / active accent */
    --primary-ink: #ffffff;

    /* Vivid tier scale — replaces the old pastels. Hot (top) → cool (bottom).
       All bright enough for black chip text; the chip label disambiguates
       adjacent hues. */
    --t-ss: #ffc400;  /* gold  */
    --t-sp: #ff5252;  /* red   */
    --t-s:  #ff7b00;  /* orange */
    --t-sm: #ffa000;  /* amber-orange */
    --t-ap: #ffd600;  /* yellow */
    --t-a:  #c6ff00;  /* lime  */
    --t-am: #69f0ae;  /* mint  */
    --t-b:  #40c4ff;  /* sky   */
    --t-c:  #82b1ff;  /* periwinkle */
    --t-d:  #b0bec5;  /* blue-grey */
    --t-na: #e0e0e0;

    /* Legacy aliases so any leftover --bg-*/--text-*/--accent* keep resolving. */
    --bg-0: var(--canvas);
    --bg-1: var(--panel);
    --bg-2: var(--panel-soft);
    --bg-3: var(--panel-strong);
    --hairline: var(--border);
    --hairline-soft: #d7d7d1;
    --hairline-strong: var(--border);
    --surface-card: var(--panel);
    --surface-strong: var(--panel-strong);
    --canvas-soft: var(--panel-soft);
    --border-strong: var(--border);
    --text: var(--ink);
    --text-dim: var(--body-color);
    --text-faint: var(--muted);
    --accent: var(--primary);
    --accent-2: var(--c-cyan);
    --success: var(--c-green);
    --error: var(--c-rose);

    --appbar-h: 52px;
    --nav-h: 60px;
    --tabbar-h: var(--appbar-h);   /* legacy var used by some page calc() */

    --font-display: "Russo One", system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-sans: "Chakra Petch", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box }
  html, body { margin: 0; padding: 0 }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100% }
  body {
    background: var(--canvas);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    /* leave room for the fixed bottom nav + iOS home indicator */
    padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
  }
  a { color: var(--primary); text-underline-offset: 3px; font-weight: 600 }
  img { max-width: 100% }
  button { font-family: inherit }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto }
    * { transition: none !important; animation: none !important }
  }

  #omni-main { display: block }

  /* ---- Page section primitives ---- */
  section.page { display: block }
  section.page[hidden] { display: none !important }
  .page-wrap { padding: 12px 12px 24px }

  /* ---- Shared controls bar ---- */
  .controls {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-bottom: 14px;
  }
  .search { position: relative; flex: 1 1 100%; min-width: 0 }
  .search input {
    width: 100%; background: var(--panel);
    border: var(--border-w) solid var(--border);
    color: var(--ink); padding: 11px 12px 11px 38px;
    font-family: var(--font-sans); font-size: 16px; font-weight: 500;
    outline: none;
  }
  .search input::placeholder { color: var(--muted-soft) }
  .search input:focus {
    box-shadow: var(--shadow-sm);
    border-color: var(--primary);
  }
  .search::before {
    content: "⌕"; position: absolute; left: 12px; top: 9px;
    font-size: 20px; color: var(--muted); line-height: 1;
  }

  /* Segmented control — horizontal scroll on overflow, sharp chips */
  .seg {
    display: inline-flex; gap: 0; flex-wrap: nowrap;
    border: var(--border-w) solid var(--border);
    background: var(--panel); overflow-x: auto; max-width: 100%;
    scrollbar-width: none;
  }
  .seg::-webkit-scrollbar { display: none }
  .seg button {
    background: var(--panel); border: 0; border-right: var(--border-w) solid var(--border);
    color: var(--body-color); padding: 9px 13px; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; min-height: 44px;
    transition: background-color .12s ease, color .12s ease;
  }
  .seg button:last-child { border-right: 0 }
  .seg button:hover { background: var(--panel-strong) }
  .seg button.active { background: var(--ink); color: var(--on-dark) }

  select.mode-picker {
    background: var(--panel); color: var(--ink);
    border: var(--border-w) solid var(--border);
    padding: 9px 30px 9px 12px;
    font-family: var(--font-sans); font-size: 14px; font-weight: 600;
    cursor: pointer; appearance: none; -webkit-appearance: none; min-height: 44px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%230a0a0a' d='M5 6L0 0h10z'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
  }
  select.mode-picker:focus { outline: none; box-shadow: var(--shadow-sm) }
  .count {
    color: var(--ink); font-size: 12px; margin-left: auto;
    font-family: var(--font-mono); font-weight: 700;
    background: var(--c-amber); border: var(--border-w) solid var(--border);
    padding: 5px 9px; white-space: nowrap;
  }

  /* ---- Bottom tab bar (fixed) ---- */
  .botnav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 100;
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: var(--ink);
    border-top: var(--border-w-strong) solid var(--border);
  }
  .botnav button {
    background: transparent; border: 0; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 6px 2px; min-height: 44px;
    color: #c9c9c4; font-family: var(--font-sans);
    border-top: 3px solid transparent; margin-top: -3px;
    transition: color .12s ease, background-color .12s ease;
  }
  .botnav button svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2 }
  .botnav button .lbl {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.2px;
    text-transform: uppercase; line-height: 1;
  }
  .botnav button:hover { color: #fff }
  .botnav button.active {
    color: var(--ink); background: var(--c-amber);
    border-top-color: var(--ink);
  }
  .botnav button:focus-visible { outline: 3px solid var(--c-cyan); outline-offset: -3px }

  /* ---- Shared profile modal — bottom sheet on mobile ---- */
  #omni-modal-bg {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,10,10,0.55);
    display: none; align-items: flex-end; justify-content: center;
  }
  #omni-modal-bg.open { display: flex }
  #omni-modal {
    background: var(--panel);
    border-top: var(--border-w-strong) solid var(--border);
    width: 100%; max-height: 92dvh; overflow: auto;
    color: var(--ink);
    animation: sheet-up .18s ease-out;
  }
  @keyframes sheet-up { from { transform: translateY(100%) } to { transform: translateY(0) } }
  /* Profile modal: fixed height so switching tabs never resizes the sheet.
     Header + tab bar stay put; only the active tab panel scrolls. Scoped to
     .omni-profile so other modals (e.g. relic detail) keep their auto height. */
  #omni-modal.omni-profile {
    height: 90dvh; max-height: 90dvh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  #omni-modal.omni-profile header { flex: 0 0 auto; position: static }
  #omni-modal.omni-profile .body {
    flex: 1 1 auto; min-height: 0; overflow: hidden;
    display: flex; flex-direction: column; padding: 0;
  }
  #omni-modal header {
    display: flex; gap: 12px; padding: 14px 14px;
    align-items: center;
    border-bottom: var(--border-w-strong) solid var(--border);
    background: var(--c-amber);
    position: sticky; top: 0; z-index: 2;
  }
  #omni-modal header .portrait {
    width: 64px; height: 64px; overflow: hidden;
    background: var(--panel); border: var(--border-w) solid var(--border);
    flex-shrink: 0;
  }
  #omni-modal header .portrait img,
  #omni-modal header .portrait .initials {
    width: 100%; height: 100%; object-fit: cover; display: grid;
    place-items: center; font-family: var(--font-display); font-size: 22px;
    color: var(--ink); background: var(--panel-strong);
  }
  #omni-modal h2 {
    margin: 0; font-family: var(--font-display); font-size: 20px; line-height: 1.1;
    color: var(--ink); text-transform: uppercase; letter-spacing: 0.3px;
  }
  #omni-modal .badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap }
  #omni-modal .badges .pill {
    background: var(--ink); color: var(--on-dark);
    font-size: 11px; padding: 3px 8px; font-weight: 700; letter-spacing: 0.03em;
  }
  #omni-modal .badges .pill.score { background: var(--primary); color: #fff }
  #omni-modal .close {
    margin-left: auto; background: var(--ink); color: var(--on-dark);
    border: var(--border-w) solid var(--border);
    font-size: 22px; cursor: pointer; line-height: 1;
    min-width: 44px; min-height: 44px; display: grid; place-items: center;
  }
  #omni-modal .close:hover { background: var(--c-rose) }
  #omni-modal .body { padding: 14px }
  #omni-modal .body h3 {
    margin: 18px 0 8px; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink);
    border-left: 5px solid var(--primary); padding-left: 8px;
  }
  #omni-modal .body h3:first-child { margin-top: 0 }
  #omni-modal .body .block {
    background: var(--panel-soft); border: var(--border-w) solid var(--border);
    padding: 11px 12px; color: var(--body-color); font-size: 14px; line-height: 1.55;
    white-space: pre-wrap;
  }
  #omni-modal .body .block.empty { color: var(--muted); font-style: italic }

  /* ---- Shared character profile (Omni.openProfile) — neubrutalist ---- */
  .omni-profile .ranks {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
  }
  .omni-profile .ranks .group-block {
    grid-column: 1 / -1;
    color: var(--ink); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 0 2px;
  }
  .omni-profile .ranks .item {
    background: var(--panel-soft); border: var(--border-w) solid var(--border);
    padding: 7px 9px;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .omni-profile .ranks .item .lbl {
    font-size: 12px; color: var(--body-color); font-weight: 600; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .omni-profile .tier-chip {
    display: inline-block; min-width: 30px; text-align: center;
    padding: 3px 7px; border: 2px solid var(--border);
    font-weight: 700; font-size: 11px; color: var(--ink);
    line-height: 1.3; letter-spacing: 0.04em; font-family: var(--font-mono);
  }
  .omni-profile .tier-chip.empty {
    background: var(--panel-strong); color: var(--muted); border-style: dashed;
    font-family: var(--font-sans);
  }
  .omni-profile .rune-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
  }
  .omni-profile .rune-grid .cell {
    background: var(--panel-soft); border: var(--border-w) solid var(--border);
    padding: 8px 10px;
  }
  .omni-profile .rune-grid .cell .k {
    display: block; color: var(--muted); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px;
  }
  .omni-profile .rune-grid .cell .v { color: var(--ink); font-size: 13px; font-weight: 600; line-height: 1.4 }
  .omni-profile .rune-text {
    background: var(--panel-soft); border: var(--border-w) solid var(--border);
    border-left: 5px solid var(--c-cyan);
    padding: 11px 12px; margin-top: 8px;
    color: var(--body-color); font-size: 13.5px; line-height: 1.6; white-space: pre-wrap;
  }
  .omni-profile .priorities { display: flex; flex-direction: column; gap: 6px }
  .omni-profile .priorities .prow {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--panel-soft); border: var(--border-w) solid var(--border);
    border-left-width: 6px; border-left-color: var(--c, var(--muted));
    padding: 9px 11px;
  }
  .omni-profile .priorities .prow .dot {
    width: 12px; height: 12px; margin-top: 3px; flex-shrink: 0;
    background: var(--c, var(--muted)); border: 2px solid var(--border);
  }
  .omni-profile .priorities .prow .ptext { min-width: 0 }
  .omni-profile .priorities .prow .plabel { font-size: 13px; color: var(--ink); font-weight: 700 }
  .omni-profile .priorities .prow .pgroup { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 500 }

  .omni-profile .skills { display: flex; flex-direction: column; gap: 8px }
  .omni-profile .skill {
    display: grid; grid-template-columns: 44px 1fr; gap: 10px;
    background: var(--panel-soft); border: var(--border-w) solid var(--border);
    padding: 10px 11px;
  }
  .omni-profile .skill .icon {
    width: 44px; height: 44px; overflow: hidden;
    background: var(--panel-strong); border: 2px solid var(--border);
    display: grid; place-items: center;
  }
  /* Fixed per-slot glyph (no game images) — tint mirrors the type badge color. */
  .omni-profile .skill .icon .glyph { font-size: 22px; line-height: 1; color: var(--muted-soft) }
  .omni-profile .skill .icon.slot-ultimate .glyph { color: var(--c-amber) }
  .omni-profile .skill .icon.slot-active   .glyph { color: var(--c-amber) }
  .omni-profile .skill .icon.slot-passive  .glyph { color: var(--c-cyan) }
  .omni-profile .skill .icon.slot-oath     .glyph { color: var(--c-violet) }
  .omni-profile .skill .icon.slot-link     .glyph { color: var(--c-violet) }
  .omni-profile .skill .s-body { min-width: 0 }
  .omni-profile .skill .s-head {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px;
  }
  .omni-profile .skill .s-name { font-size: 14px; font-weight: 700; color: var(--ink) }
  .omni-profile .skill .s-type {
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 7px; border: 2px solid var(--border); color: var(--ink); background: var(--panel);
  }
  .omni-profile .skill .s-type.passive { background: var(--c-cyan) }
  .omni-profile .skill .s-type.active { background: var(--c-amber) }
  .omni-profile .skill .s-desc {
    color: var(--body-color); font-size: 13px; line-height: 1.55; white-space: pre-wrap;
  }
  .omni-profile .empty-state {
    color: var(--muted); font-style: italic; font-size: 13px; padding: 4px 0;
  }

  /* skill_profile: bilingual, per-level unlocks, rune-skill subsection */
  .omni-profile .skills-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-wrap: wrap; margin: 18px 0 8px;
  }
  .omni-profile .skills-head h3 { margin: 0 }
  .omni-profile .lang-toggle { flex: 0 0 auto }
  .omni-profile .lang-toggle button { padding: 6px 12px; min-height: 32px; font-size: 12px }
  .omni-profile .skill .s-type.ultimate { background: var(--c-amber) }
  .omni-profile .skill .s-type.oath { background: var(--c-violet); color: var(--on-dark) }
  .omni-profile .skill .s-unlock {
    display: inline-block; font-size: 11px; font-weight: 700;
    color: var(--muted); margin-bottom: 4px;
  }
  .omni-profile .skill-levels {
    display: flex; flex-direction: column; gap: 6px;
    margin-top: 8px; padding-top: 8px; border-top: 2px dashed var(--border);
  }
  .omni-profile .skill-level { font-size: 12px; line-height: 1.5; white-space: pre-wrap }
  .omni-profile .skill-level .lv-unlock { font-weight: 700; color: var(--ink) }
  .omni-profile .skill-level .lv-text { color: var(--body-color) }
  .omni-profile .rune-skill { display: flex; flex-direction: column; gap: 8px }
  .omni-profile .rune-tier {
    background: var(--panel-soft); border: var(--border-w) solid var(--border);
    border-left: 5px solid var(--c-violet); padding: 10px 11px;
  }
  .omni-profile .rune-tier .rt-name {
    font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 4px;
  }
  .omni-profile .rune-tier .rt-effect {
    font-size: 13px; line-height: 1.55; color: var(--body-color); white-space: pre-wrap;
  }
  /* rune-tier border color by level: I=amber, II=green, III=red (mirrors in-game rune levels) */
  .omni-profile .rune-tier.tier-1 { border-color: var(--c-amber) }
  .omni-profile .rune-tier.tier-2 { border-color: var(--c-green) }
  .omni-profile .rune-tier.tier-3 { border-color: var(--c-rose) }

  /* Profile section tabs (Skills / Tier ranks / Rune) — reuse .seg, fixed row */
  .omni-profile .profile-tabs { display: flex; flex: 0 0 auto; margin: 14px 14px 0 }
  .omni-profile .profile-tabs button { flex: 1 1 0; text-align: center; padding: 10px 8px }
  /* Each panel fills the remaining modal height and scrolls on its own, so the
     sheet stays a constant size across tabs. Hidden panels drop out via [hidden]. */
  .omni-profile .omni-tabpanel { flex: 1 1 auto; min-height: 0; overflow: auto; padding: 14px }
  /* First heading of each panel hugs the tab bar (no leading gap) */
  .omni-profile .omni-tabpanel > :first-child,
  .omni-profile #omni-skills-section > :first-child { margin-top: 0 }

  footer.site {
    text-align: center; color: var(--muted); font-size: 12px; font-weight: 500;
    padding: 22px 14px 28px; border-top: var(--border-w-strong) solid var(--border);
    margin-top: 24px;
  }
  footer.site a { color: var(--primary) }

  /* Larger screens: center a comfortable column; this is a mobile-first page. */
  @media (min-width: 768px) {
    #omni-main { max-width: 820px; margin-left: auto; margin-right: auto }
    .botnav { max-width: 820px; margin: 0 auto; border-left: var(--border-w) solid var(--border); border-right: var(--border-w) solid var(--border) }
    #omni-modal { max-width: 720px; border: var(--border-w-strong) solid var(--border) }
    #omni-modal-bg { align-items: center; padding: 20px }
  }
</style>
</head>
<body>

<main id="omni-main">
<!-- page: tier-list -->
<style>
  /* Mobile tier-list — neubrutalist. Tier groups = vivid label block + sharp
     hero cards; Full table = horizontal-scroll grid with sticky hero column +
     sticky header so EVERY mode column stays reachable on a phone.
     Generated HTML class names match the (reused) page script. */

  .page-tier-list .tier-row {
    display: grid; grid-template-columns: 56px 1fr;
    border: var(--border-w) solid var(--border);
    background: var(--panel); margin-bottom: 12px; box-shadow: var(--shadow-sm);
  }
  .page-tier-list .tier-row .tier-label {
    display: grid; place-items: center;
    font-family: var(--font-display); font-size: 24px; color: var(--ink);
    background: var(--tier-color, var(--panel-strong));
    border-right: var(--border-w) solid var(--border);
  }
  .page-tier-list .tier-row .tier-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));

    background: var(--panel-soft);

    overflow: hidden; word-break: break-word;
  }

  .page-tier-list .tableview {
    background: var(--panel); border: var(--border-w) solid var(--border);

  }

    padding: 7px 6px; border-bottom: 2px solid var(--border);
    text-align: center; white-space: nowrap;
  }
  .page-tier-list table.t thead th {
    position: sticky; background: var(--ink); color: var(--on-dark);

  .page-tier-list table.t td.name-cell {

    border-right: var(--border-w) solid var(--border);

  .page-tier-list table.t tr:nth-child(even) td.name-cell { background: var(--panel-soft) }
  .page-tier-list table.t .row-portrait {

  .page-tier-list table.t .row-portrait img,
  .page-tier-list table.t .row-portrait .initials-sm {

<style>
  /* Mobile Runes page — neubrutalist. Hosts TWO sub-tabs in one fragment
     (mirrors the Relics page): "Priority" (tier blocks of priority-framed
     portraits) and "Notes" (one wide rune-build table). Class names match the
     merged page script. */

  .page-rune-priority {
    /* Priority frame colors. Semantic red/orange/yellow with a deliberate
       dark→mid→bright lightness ramp so the three stay distinct (incl. for
       color-blind viewers); black neubrutalist frames carry the contrast. */
    --rp-red:    #e60000;  /* legendary (4 Legendary) */
    --rp-orange: #00a651;  /* mixed (2 Epic 2 Leg.) → green (far from red+yellow) */
    --rp-yellow: #ffd000;  /* epic (4 Epic) */
    --rp-skip:   #9e9e9e;

    /* Notes-table impact colors (reuse the global tier scale). */
    --rn-z: var(--t-ss);
    --rn-y: var(--t-s);
    --rn-x: var(--t-ap);
    --rn-w: var(--t-c);
    --rn-none: var(--panel-strong);
  }

  /* ── Sub-tab switch: Priority | Notes ─────────────────────────────────── */
  .page-rune-priority .subtabs {
    display: grid; grid-template-columns: 1fr 1fr;
    border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm);
    margin-bottom: 14px;
  }
  .page-rune-priority .subtabs button {
    background: var(--panel); border: 0; border-right: var(--border-w) solid var(--border);
    color: var(--body-color); font-family: var(--font-display); font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.4px; padding: 12px 10px; min-height: 46px;
    cursor: pointer; transition: background-color .12s ease, color .12s ease;
  }
  .page-rune-priority .subtabs button:last-child { border-right: 0 }
  .page-rune-priority .subtabs button.active { background: var(--ink); color: var(--on-dark) }
  .page-rune-priority .subpanel[hidden] { display: none }

  /* ── Priority sub-tab ─────────────────────────────────────────────────── */
  .page-rune-priority .legend {
    display: flex; gap: 8px; flex-wrap: wrap; color: var(--ink); font-size: 12px; width: 100%;
  }
  .page-rune-priority .legend .pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--panel); border: var(--border-w) solid var(--border);
    padding: 5px 10px; font-weight: 700;
  }
  .page-rune-priority .legend .swatch {
    width: 12px; height: 12px; border: 2px solid var(--border); background: var(--c, var(--muted));
  }

  .page-rune-priority .tiers { display: flex; flex-direction: column; gap: 12px }
  .page-rune-priority .tier {
    padding: 12px; background: var(--panel);
    border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm);
  }
  .page-rune-priority .tier strong {
    display: block; font-family: var(--font-display); font-size: 16px;
    text-transform: uppercase; letter-spacing: 0.3px; color: var(--ink); margin-bottom: 8px;
  }
  .page-rune-priority .tier-notes {
    white-space: pre-line; margin: 0 0 12px; color: var(--body-color); font-size: 13px;
    line-height: 1.5; font-weight: 500;
    border-left: 5px solid var(--c-cyan); padding-left: 9px;
  }

  .page-rune-priority .portraits { display: flex; gap: 10px; flex-wrap: wrap }
  .page-rune-priority .portrait {
    width: 62px; height: 62px; overflow: hidden;
    background: var(--panel-soft);
    border: 3px solid var(--c, var(--muted));
    flex-shrink: 0; cursor: default;
  }
  .page-rune-priority .portrait[data-name] { cursor: pointer }
  .page-rune-priority .portrait:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px }
  .page-rune-priority .portrait img { width: 100%; height: 100%; object-fit: cover; display: block }
  .page-rune-priority .portrait .initials {
    width: 100%; height: 100%; display: grid; place-items: center;
    font-family: var(--font-display); font-size: 16px; color: var(--ink); background: var(--panel-strong);
  }

  /* ── Notes sub-tab ────────────────────────────────────────────────────── */
  /* ONE wide table kept fully visible via a horizontal-scroll wrapper with a
     sticky hero column + sticky header, so no column is dropped on a phone. */
  .page-rune-priority .table-wrap {
    background: var(--panel); border: var(--border-w) solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .page-rune-priority table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12.5px }
  .page-rune-priority thead th {
    position: sticky; top: 0; z-index: 3;
    background: var(--ink); color: var(--on-dark);
    text-align: left; font-weight: 700; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 10px 11px; white-space: nowrap;
    border-bottom: var(--border-w) solid var(--border);
  }
  .page-rune-priority thead th.hero-col,
  .page-rune-priority tbody td.hero-col {
    position: sticky; left: 0; z-index: 2; background: var(--panel);
    border-right: var(--border-w) solid var(--border);
  }
  .page-rune-priority thead th.hero-col { z-index: 4; background: var(--ink) }

  .page-rune-priority tbody td {
    padding: 10px 11px; border-bottom: 2px solid var(--border);
    vertical-align: top; color: var(--ink); line-height: 1.45;
  }
  .page-rune-priority tbody tr { cursor: pointer }
  .page-rune-priority tbody tr:focus-visible { outline: 3px solid var(--primary); outline-offset: -3px }
  .page-rune-priority tbody tr:nth-child(even) td { background: var(--panel-soft) }
  .page-rune-priority tbody tr:nth-child(even) td.hero-col { background: var(--panel-soft) }
  .page-rune-priority tbody tr:last-child td { border-bottom: 0 }

  .page-rune-priority .hero { display: flex; align-items: center; min-width: 0 }
  .page-rune-priority .hero .portrait {
    width: 42px; height: 42px; overflow: hidden;
    background: var(--panel-soft); border: var(--border-w) solid var(--border); flex-shrink: 0;
  }
  .page-rune-priority .hero .portrait img { width: 100%; height: 100%; object-fit: cover; display: block }
  .page-rune-priority .hero .portrait .initials {
    width: 100%; height: 100%; display: grid; place-items: center;
    font-family: var(--font-display); font-size: 14px; color: var(--ink); background: var(--panel-strong);
  }

  .page-rune-priority td.rune-type, .page-rune-priority td.secondary { min-width: 120px; color: var(--body-color); font-weight: 600 }
  .page-rune-priority td.substat {
    min-width: 120px; color: var(--body-color); white-space: pre-line;
    font-family: var(--font-mono); font-size: 11.5px;
  }
  .page-rune-priority td.unique { width: 62px; text-align: center }
  .page-rune-priority td.unique .pill {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border: 2px solid var(--border); letter-spacing: 0.04em;
  }
  .page-rune-priority td.unique .pill.yes { background: var(--primary); color: #fff }
  .page-rune-priority td.unique .pill.no { background: var(--panel-strong); color: var(--muted) }

  .page-rune-priority td.impact { width: 116px; white-space: nowrap }
  .page-rune-priority .impact-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--c, var(--panel-strong)); color: var(--ink);
    border: 2px solid var(--border); padding: 3px 9px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.03em;
  }
  .page-rune-priority .impact-pill .code { font-size: 10px; color: var(--ink); font-family: var(--font-mono) }

  .page-rune-priority td.reasoning, .page-rune-priority td.if-needed {
    color: var(--body-color); font-size: 12.5px; line-height: 1.5;
    white-space: pre-line; min-width: 200px; max-width: 320px;
  }
  .page-rune-priority td.if-needed { color: var(--muted); font-style: italic }

  .page-rune-priority .empty-result {
    text-align: center; color: var(--muted); padding: 48px 20px; font-style: italic;
  }
</style>

<style>
  /* Mobile relics-priority — neubrutalist relic cards grouped by priority
     section. Relic-centric (no character profile). Each card shows the relic
     icon (harvested from the Relics Tier List tab) + star breakpoints (with the
     sheet's red "key" levels preserved) + Focus / Spending badges + Source +
     notes. Only control is the section filter. */

  .page-relics-priority .section { margin-bottom: 26px }
  .page-relics-priority .section-head {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin: 0 0 10px; padding: 8px 10px;
    background: var(--ink); color: var(--on-dark);
  }
  .page-relics-priority .section-head h2 {
    margin: 0; font-family: var(--font-display); font-size: 15px;
    text-transform: uppercase; letter-spacing: 0.3px; color: var(--on-dark);
    line-height: 1.15;
  }
  .page-relics-priority .section-note {
    color: var(--body-color); font-size: 13px; line-height: 1.5; font-weight: 500;
    margin: 0 0 12px; border-left: 5px solid var(--c-cyan); padding-left: 10px;
  }

  .page-relics-priority .relic-list { display: flex; flex-direction: column; gap: 10px }

  .page-relics-priority .rcard {
    display: grid; grid-template-columns: 56px minmax(0, 1fr); gap: 10px;
    padding: 9px 10px; background: var(--panel);
    border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm);
  }
  .page-relics-priority .rcard.skip { opacity: 0.72 }
  .page-relics-priority .rcard .ricon {
    width: 56px; height: 56px; overflow: hidden;
    background: var(--panel-soft); border: var(--border-w) solid var(--border);
  }
  .page-relics-priority .rcard .ricon img { width: 100%; height: 100%; object-fit: contain; display: block }
  .page-relics-priority .rcard .ricon .initials {
    width: 100%; height: 100%; display: grid; place-items: center;
    font-family: var(--font-display); font-size: 18px; color: var(--ink); background: var(--panel-strong);
  }
  .page-relics-priority .rcard .rbody { min-width: 0 }
  .page-relics-priority .rcard .row1 {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .page-relics-priority .rcard .name {
    font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: 0.1px;
    overflow-wrap: anywhere; min-width: 0;
  }

  /* Focus / Spending / Skip badges. */
  .page-relics-priority .badges { display: inline-flex; gap: 6px; flex-wrap: wrap; margin-left: auto }
  .page-relics-priority .badge {
    font-size: 10.5px; padding: 2px 8px; font-weight: 700; border: 2px solid var(--border);
    color: var(--ink); letter-spacing: 0.02em; text-transform: uppercase; white-space: nowrap;
  }
  .page-relics-priority .badge.focus-pvp     { background: var(--c-rose); color: #fff }
  .page-relics-priority .badge.focus-pve     { background: var(--c-green) }
  .page-relics-priority .badge.focus-both    { background: var(--c-violet); color: #fff }
  .page-relics-priority .badge.focus-pvppve  { background: var(--c-amber) }
  .page-relics-priority .badge.spend-justified { background: var(--c-cyan) }
  .page-relics-priority .badge.spend-whale     { background: var(--c-amber) }
  .page-relics-priority .badge.skip { background: var(--c-rose); color: #fff }

  /* Star-level breakpoints; red numbers mirror the source sheet's highlight. */
  .page-relics-priority .breaks {
    display: flex; align-items: baseline; gap: 7px; margin-top: 8px; flex-wrap: wrap;
  }
  .page-relics-priority .breaks .lbl {
    text-transform: uppercase; letter-spacing: 0.06em; font-size: 9.5px;
    font-weight: 700; color: var(--muted);
  }
  .page-relics-priority .breaks .val {
    color: var(--ink); font-weight: 700; font-size: 13px; font-family: var(--font-mono);
    border: 2px solid var(--border); padding: 2px 8px; background: var(--panel-strong);
    line-height: 1.3;
  }
  .page-relics-priority .breaks .val .num.red { color: var(--c-rose); }

  .page-relics-priority .notes {
    color: var(--body-color); font-size: 13.5px; line-height: 1.5;
    white-space: pre-wrap; overflow-wrap: anywhere; margin-top: 8px;
  }
  .page-relics-priority .notes.skip { font-weight: 700; color: var(--c-rose) }

  .page-relics-priority .source {
    display: flex; align-items: baseline; gap: 7px; margin-top: 8px;
    font-size: 12px; line-height: 1.45;
  }
  .page-relics-priority .source .lbl {
    text-transform: uppercase; letter-spacing: 0.06em; font-size: 9.5px;
    font-weight: 700; color: var(--muted); flex-shrink: 0;
  }
  .page-relics-priority .source .val { color: var(--body-color); font-weight: 600; overflow-wrap: anywhere }

  .page-relics-priority .tbd { margin-top: 6px; color: var(--muted); font-style: italic; font-size: 12.5px }

  .page-relics-priority .empty-result {
    text-align: center; color: var(--muted); padding: 40px; font-style: italic;
  }

  /* ── Sub-tab switch: Priority | Tier List ─────────────────────────────── */
  .page-relics-priority .subtabs {
    display: grid; grid-template-columns: 1fr 1fr;
    border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm);
    margin-bottom: 14px;
  }
  .page-relics-priority .subtabs button {
    background: var(--panel); border: 0; border-right: var(--border-w) solid var(--border);
    color: var(--body-color); font-family: var(--font-display); font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.4px; padding: 12px 10px; min-height: 46px;
    cursor: pointer; transition: background-color .12s ease, color .12s ease;
  }
  .page-relics-priority .subtabs button:last-child { border-right: 0 }
  .page-relics-priority .subtabs button.active { background: var(--ink); color: var(--on-dark) }
  .page-relics-priority .subpanel[hidden] { display: none }

  /* ── Tier List "lite" table: relic + 6 mode grades, row → detail ──────── */
  .page-relics-priority .rt-scroll {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm);
    background: var(--panel);
  }
  .page-relics-priority .rt-scroll::-webkit-scrollbar { height: 6px }
  .page-relics-priority table.rt-table {
    border-collapse: separate; border-spacing: 0; width: 100%;
  }
  .page-relics-priority .rt-table th, .page-relics-priority .rt-table td {
    border-bottom: 2px solid var(--border); text-align: center; padding: 6px 4px;
  }
  .page-relics-priority .rt-table tbody tr:last-child td { border-bottom: 0 }
  .page-relics-priority .rt-table thead th {
    position: sticky; top: 0; z-index: 3; background: var(--ink); color: var(--on-dark);
    font-family: var(--font-display); font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.3px; white-space: nowrap; cursor: pointer;
  }
  .page-relics-priority .rt-table thead th.sorted { background: var(--c-amber); color: var(--ink) }
  .page-relics-priority .rt-table th.c-relic, .page-relics-priority .rt-table td.c-relic {
    position: sticky; left: 0; z-index: 2; text-align: center;
    width: 84px; min-width: 84px; max-width: 84px; padding: 8px 6px;
    background: var(--panel); border-right: var(--border-w) solid var(--border);
  }
  .page-relics-priority .rt-table thead th.c-relic { z-index: 4; background: var(--ink); cursor: default }
  .page-relics-priority .rt-table td.g-cell { width: 42px; min-width: 42px }
  .page-relics-priority .rt-table tbody tr { cursor: pointer }
  .page-relics-priority .rt-table tbody tr:hover td { background: var(--panel-strong) }
  /* Icon on top, name below, whole cell width-locked (see td.c-relic) so long
     names truncate instead of pushing the grade columns off-screen on mobile. */
  .page-relics-priority .rt-relic {
    display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%;
  }
  .page-relics-priority .rt-relic .ic {
    width: 60px; height: 60px; flex-shrink: 0; overflow: hidden;
    border: 2px solid var(--border); background: var(--panel-strong);
  }
  .page-relics-priority .rt-relic .ic img { width: 100%; height: 100%; object-fit: contain; display: block }
  .page-relics-priority .rt-relic .ic .initials {
    width: 100%; height: 100%; display: grid; place-items: center;
    font-family: var(--font-display); font-size: 18px; color: var(--ink);
  }
  .page-relics-priority .rt-relic .nm {
    width: 100%; text-align: center; font-weight: 700; color: var(--ink);
    font-size: 11px; line-height: 1.15; overflow-wrap: anywhere;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .page-relics-priority .g {
    display: inline-block; min-width: 26px; padding: 3px 5px; border: 2px solid var(--border);
    font-family: var(--font-mono); font-weight: 700; font-size: 11.5px; color: var(--ink); line-height: 1.25;
  }
  .page-relics-priority .g.empty { background: var(--panel-strong); color: var(--muted); border-style: dashed }
  .page-relics-priority .rt-hint {
    color: var(--muted); font-size: 12px; font-weight: 500; margin: 10px 2px 0; font-style: italic;
  }

  /* ── Relic profile ────────────────────────────────────────────────────
     Tapping a relic (priority card or tier row) opens the shared relic
     profile in #omni-modal.omni-profile. The profile reuses the shell's
     .omni-profile styles (.ranks/.tier-chip/.rune-grid/.block/.badges), so
     only these interaction affordances + the modal-scoped red breakpoint
     colour (page CSS can't reach inside the shell modal) live here. */
  .page-relics-priority .rcard { cursor: pointer; }
  .page-relics-priority .rcard:focus-visible,
  .page-relics-priority .rt-table tr[data-name]:focus-visible {
    outline: 3px solid var(--primary); outline-offset: -3px;
  }
  #omni-modal .breaks-block { font-family: var(--font-mono); letter-spacing: 0.04em; font-weight: 600; }
  #omni-modal .rp-num.red { color: var(--c-rose); font-weight: 700; }
  /* Relic-only skill badges: Link Skill slot (violet, mirrors the hero oath
     badge) and the neutral CD chip next to an active skill's type badge. */
  #omni-modal .skill .s-type.link { background: var(--c-violet); color: var(--on-dark); }
  #omni-modal .skill .s-type.cd { background: var(--panel-strong); }
</style>
