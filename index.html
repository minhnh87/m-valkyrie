    'others': '<circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/>',
  };
  function iconSVG(slug) {
    return `<svg viewBox="0 0 24 24" aria-hidden="true" stroke-linecap="round" stroke-linejoin="round">${NAV_ICON[slug] || ''}</svg>`;
  }

  // --- hash helpers ---
  function getParams() {
    return new URLSearchParams((location.hash || '').replace(/^#/, ''));
  }
  function getActivePage() {
    const slug = getParams().get('page');
    return SLUGS.has(slug) ? slug : PAGES[0].slug;
  }
  function writePageHash(slug, paramsObj) {
    const p = new URLSearchParams();
    p.set('page', slug);
    for (const [k, v] of Object.entries(paramsObj || {})) {
      if (v != null && v !== '') p.set(k, v);
    }
    const h = p.toString();
    history.replaceState(null, '', h ? '#' + h : location.pathname);
  }
  function readPageHash() {
    const p = getParams();
    const out = {};
    for (const [k, v] of p.entries()) if (k !== 'page') out[k] = v;
    return out;
  }

  // --- bottom nav render ---
  const navEl = document.getElementById('omni-nav');
  for (const page of PAGES) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.dataset.tab = page.slug;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-label', page.title);
    if (page.subtitle) btn.title = page.subtitle;
    btn.innerHTML = `${iconSVG(page.slug)}<span class="lbl">${NAV_LABEL[page.slug] || page.title}</span>`;
    navEl.appendChild(btn);
  }

  const pageheadEl = document.getElementById('omni-pagehead');
  function pEscText(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function activate(slug, { preserveParams = false } = {}) {
    if (!SLUGS.has(slug)) slug = PAGES[0].slug;
    for (const sec of document.querySelectorAll('section.page')) {
      sec.hidden = sec.dataset.tab !== slug;
    }
    for (const btn of navEl.querySelectorAll('button')) {
      const isActive = btn.dataset.tab === slug;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    }
    const meta = PAGES.find(p => p.slug === slug);
    if (meta && pageheadEl) {
      pageheadEl.innerHTML = `<h1>${pEscText(meta.title)}</h1>` +
        (meta.subtitle ? `<div class="sub">${pEscText(meta.subtitle)}</div>` : '');
    }
    if (!preserveParams) writePageHash(slug, {});
    window.scrollTo(0, 0);
    document.dispatchEvent(new CustomEvent('omni:tab-active', { detail: { slug } }));
  }

  document.body.addEventListener('click', e => {
    const btn = e.target.closest('.botnav button[data-tab]');
    if (btn) activate(btn.dataset.tab);
  });

  // --- shared modal API ---
  const modalBg = document.getElementById('omni-modal-bg');
  const modal = document.getElementById('omni-modal');
  let _lastFocused = null;
  function openModal(html) {
    _lastFocused = document.activeElement;
    modal.className = '';
    modal.innerHTML = html;
    modalBg.classList.add('open');
    document.body.style.overflow = 'hidden';
    const closeBtn = modal.querySelector('.close');
    if (closeBtn) closeBtn.focus();
    else { modal.setAttribute('tabindex', '-1'); modal.focus(); }
  }
  function closeModal() {
    modalBg.classList.remove('open');
    modal.innerHTML = '';
    document.body.style.overflow = '';
    document.dispatchEvent(new CustomEvent('omni:modal-closed'));
    if (_lastFocused && typeof _lastFocused.focus === 'function') _lastFocused.focus();
    _lastFocused = null;
  }
  modalBg.addEventListener('click', e => {
    if (e.target === modalBg) closeModal();
    if (e.target.classList && e.target.classList.contains('close')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (!modalBg.classList.contains('open')) return;
    if (e.key === 'Escape') { closeModal(); return; }
    if (e.key === 'Tab') {
      const f = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
      if (!f.length) { e.preventDefault(); return; }
      const first = f[0], last = f[f.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  });

  // --- shared character profile (Omni.openProfile) ---
  const CHARS = (() => {
    const el = document.getElementById('omni-characters');
    try { return JSON.parse(el.textContent); }
    catch (e) { console.warn('omni-characters data missing/invalid', e); return null; }
  })();

  function pEsc(s) {
    return (s == null ? '' : String(s)).replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function pInitials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length || !parts[0]) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function pNorm(s) { return (s || '').toLowerCase().replace(/\s+/g, ''); }

  // Bilingual skill_profile: EN default, persisted, toggled inside the modal.
  const SKILL_LANGS = ['en', 'vi'];
  const SLOT_LABEL = { ultimate: 'Ultimate', active: 'Active', passive: 'Passive', oath: 'Oath' };
  // Fixed glyph per skill slot — replaces the old inconsistent game images/◆.
  // Shared by the hero modal (below) and the relic modal (via Omni.slotIcon).
  const SLOT_GLYPH = { ultimate: '★', active: '◈', passive: '❖', oath: '✦', link: '⚭' };
  function slotIconHTML(slot) {
    const key = SLOT_GLYPH[slot] ? slot : '';
    return `<div class="icon${key ? ' slot-' + key : ''}">` +
      `<span class="glyph">${SLOT_GLYPH[slot] || '◆'}</span></div>`;
  }
  let _skillLang = (() => {
    try { const v = localStorage.getItem('omni-skill-lang'); return SKILL_LANGS.includes(v) ? v : 'en'; }
    catch (e) { return 'en'; }
  })();
  let _profileChar = null;  // currently open character, for in-place language re-render
  // Resolve a {en, vi} string bundle (or a plain string) to the active language.
  function pLang(v) {
    if (v == null) return '';
    if (typeof v === 'string') return v;
    return v[_skillLang] || v.en || v.vi || '';
  }

  const TIER_COLORVAR = {
    'SS':'--t-ss','S+':'--t-sp','S':'--t-s','S-':'--t-sm',
    'A+':'--t-ap','A':'--t-a','A-':'--t-am','B':'--t-b','C':'--t-c','D':'--t-d',
  };
  function pTierColor(band) {
    const v = TIER_COLORVAR[band] || '--t-na';
    return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || '#e0e0e0';
  }

  let _charLookup = null;
  function charLookup() {
    if (_charLookup) return _charLookup;
    _charLookup = new Map();
    if (CHARS && Array.isArray(CHARS.characters)) {
      for (const c of CHARS.characters) {
        _charLookup.set(pNorm(c.name), c);
        for (const a of (c.aliases || [])) _charLookup.set(pNorm(a), c);
      }
    }
    return _charLookup;
  }
  const PRIORITY_LABEL = (() => {
    const m = {};
    for (const p of (CHARS && CHARS.priorities) || []) m[p.key] = p.label;
    return m;
  })();

  // Rune-priority colors — kept in sync with .page-rune-priority --rp-* vars.
  // Overrides the raw data `border` hex (e.g. pure FFFF00, invisible on light
  // panels). The "orange" key (2 Epic 2 Leg.) uses green so it never reads
  // alike with the yellow (4 Epic) slot.
  const PRIORITY_HEX = { red: '#e60000', orange: '#00a651', yellow: '#ffd000', skip: '#9e9e9e' };

  // Skills section: rich bilingual `skill_profile` (the sole skill source).
  // Returned HTML is swapped into #omni-skills-section wholesale on a language
  // toggle. Heroes without a profile show an empty state.
  function renderSkillsSection(c) {
    if (c.skill_profile) return renderSkillProfile(c.skill_profile);
    return `<h3>Skills</h3><div class="empty-state">No skill data available for this hero yet.</div>`;
  }

  function renderSkillProfile(sp) {
    const langBtn = (code, label) =>
      `<button type="button" class="lang-btn${_skillLang === code ? ' active' : ''}" ` +
      `data-lang="${code}" aria-pressed="${_skillLang === code}">${label}</button>`;
    const toggle = `<div class="seg lang-toggle" role="group" aria-label="Skill language">` +
      `${langBtn('en', 'EN')}${langBtn('vi', 'VI')}</div>`;

    // Number multiple passive cards (Passive 1 / Passive 2) to match the in-game layout.
    const passiveCount = (sp.skills || []).filter(s => (s.slot || s.type) === 'passive').length;
    let passiveIdx = 0;
    let cards = '';
    for (const s of (sp.skills || [])) {
      const slot = s.slot || s.type || 'active';
      const badgeClass = SLOT_LABEL[slot] ? slot : (s.type === 'passive' ? 'passive' : 'active');
      let badgeLabel = SLOT_LABEL[slot] || SLOT_LABEL[s.type] || 'Active';
      if (slot === 'passive' && passiveCount > 1) badgeLabel = `Passive ${++passiveIdx}`;
      const unlock = s.unlock ? `<span class="s-unlock">${pEsc(pLang(s.unlock))}</span>` : '';
      let levels = '';
      if (s.levels && s.levels.length) {
        let rows = '';
        for (const lv of s.levels) {
          rows += `<div class="skill-level"><span class="lv-unlock">${pEsc(pLang(lv.unlock))}</span> — ` +
            `<span class="lv-text">${pEsc(pLang(lv.text))}</span></div>`;
        }
        levels = `<div class="skill-levels">${rows}</div>`;
      }
      const icon = slotIconHTML(slot);
      cards += `<div class="skill">${icon}` +
        `<div class="s-body"><div class="s-head">` +
        `<span class="s-name">${pEsc(pLang(s.name))}</span>` +
        `<span class="s-type ${badgeClass}">${pEsc(badgeLabel)}</span></div>` +
        `${unlock}<div class="s-desc">${pEsc(pLang(s.description))}</div>${levels}</div></div>`;
    }

    let out = `<div class="skills-head"><h3>Skills</h3>${toggle}</div>` +
      `<div class="skills">${cards}</div>`;

    const rs = sp.rune_skill;
    if (rs && rs.tiers && rs.tiers.length) {
      let tiers = '';
      rs.tiers.forEach((t, i) => {
        tiers += `<div class="rune-tier tier-${i + 1}"><div class="rt-name">${pEsc(pLang(t.name))}</div>` +
          `<div class="rt-effect">${pEsc(pLang(t.effect))}</div></div>`;
      });
      out += `<h3>${rs.name ? pEsc(pLang(rs.name)) : 'Rune Skill'}</h3><div class="rune-skill">${tiers}</div>`;
    }
    return out;
  }

  function renderProfile(c) {
    const av = c.avatar;
    const port = av && av.local
      ? `<img src="${pEsc(av.local)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${pEsc(pInitials(c.name))}'}))">`
      : `<div class="initials">${pEsc(pInitials(c.name))}</div>`;

    const badges = [];
    if (c.tier) {
      if (c.tier.overall != null) badges.push(`<span class="pill score">Overall ${Number(c.tier.overall).toFixed(2)}</span>`);
      if (c.tier.overall_band) badges.push(`<span class="pill">Band ${pEsc(c.tier.overall_band)}</span>`);
    }
    if (c.rune_note && c.rune_note.rune_type) badges.push(`<span class="pill">${pEsc(c.rune_note.rune_type)}</span>`);

    // Three tabbed sections: Skills (default) / Tier ranks / Rune. Each panel is
    // built only when it has data; empty ones are dropped so their tab never
    // shows. Skills is listed first, so it wins as the default active tab.
    const panels = [];  // { key, label, html }

    // Skills — re-rendered in place on the EN/VI toggle, so it keeps a stable id.
    if (c.skill_profile) {
      panels.push({ key: 'skills', label: 'Skills',
        html: `<div id="omni-skills-section">${renderSkillsSection(c)}</div>` });
    }

    // Tier ranks — grouped chip grid + optional notes.
    if (c.tier && CHARS.columns && CHARS.columns.length) {
      const grouped = {};
      for (const col of CHARS.columns) (grouped[col.group] = grouped[col.group] || []).push(col);
      let ranks = '';
      for (const [grp, cols] of Object.entries(grouped)) {
        ranks += `<div class="group-block">${pEsc(grp)}</div>`;
        for (const col of cols) {
          const t = (c.tier.tiers || {})[col.key] || '';
          ranks += `<div class="item"><span class="lbl">${pEsc(col.label)}</span>` +
            `<span class="tier-chip ${t ? '' : 'empty'}" style="${t ? `background:${pTierColor(t)}` : ''}">${pEsc(t || '–')}</span></div>`;
        }
      }
      let tierHtml = `<h3>Tier ranks</h3><div class="ranks">${ranks}</div>`;
      if (c.tier.notes) tierHtml += `<div class="rune-text">${pEsc(c.tier.notes)}</div>`;
      panels.push({ key: 'tier', label: 'Tier ranks', html: tierHtml });
    }

    // Rune — Rune build (rune_note) + Rune priority combined into one tab.
    if (c.rune_note || (c.rune_priority && c.rune_priority.length)) {
      let runeHtml = '';
      if (c.rune_note) {
        const rn = c.rune_note;
        const cells = [];
        const cell = (k, v) => { if (v != null && v !== '') cells.push(`<div class="cell"><span class="k">${pEsc(k)}</span><span class="v">${pEsc(v)}</span></div>`); };
        cell('Rune Type', rn.rune_type);
        cell('Secondary', rn.secondary_type);
        cell('Substat · pre-11★', rn.substat_pre_11 || '—');
        cell('Substat · 11★+', rn.substat_post_11 || '—');
        if (rn.roll_unique === true) cell('Roll For Unique / Supreme', 'Yes');
        else if (rn.roll_unique === false) cell('Roll For Unique / Supreme', 'No');
        if (rn.impact && rn.impact.label) cell('Impact of sub-stats', `(${rn.impact.code}) ${rn.impact.label}`);
        runeHtml += `<h3>Rune build</h3>`;
        if (cells.length) runeHtml += `<div class="rune-grid">${cells.join('')}</div>`;
        if (rn.reasoning) runeHtml += `<div class="rune-text">${pEsc(rn.reasoning)}</div>`;
        if (rn.if_needed) runeHtml += `<div class="rune-text">${pEsc(rn.if_needed)}</div>`;
      }
      if (c.rune_priority && c.rune_priority.length) {
        let rows = '';
        for (const rp of c.rune_priority) {
          const color = PRIORITY_HEX[rp.priority] || (rp.border ? `#${pEsc(rp.border)}` : 'var(--muted)');
          const plabel = PRIORITY_LABEL[rp.priority] || rp.priority || '—';
          rows += `<div class="prow" style="--c:${color}"><span class="dot"></span>` +
            `<span class="ptext"><span class="plabel">${pEsc(plabel)}</span>` +
            `${rp.group_label ? `<span class="pgroup">${pEsc(rp.group_label)}</span>` : ''}</span></div>`;
        }
        runeHtml += `<h3>Rune priority</h3><div class="priorities">${rows}</div>`;
      }
      panels.push({ key: 'rune', label: 'Rune', html: runeHtml });
    }

    // Assemble the tab bar + panels. First panel (Skills when present) is active.
    // A single panel needs no tab bar; no panels falls back to the skills
    // empty-state so the modal never renders blank.
    let body = '';
    if (!panels.length) {
      body = `<div class="omni-tabpanel"><div id="omni-skills-section">${renderSkillsSection(c)}</div></div>`;
    } else {
      const activeKey = panels[0].key;
      if (panels.length > 1) {
        const tabs = panels.map(p =>
          `<button type="button" class="ptab-btn${p.key === activeKey ? ' active' : ''}" ` +
          `role="tab" aria-selected="${p.key === activeKey}" data-ptab="${p.key}">${pEsc(p.label)}</button>`
        ).join('');
        body += `<div class="seg profile-tabs" role="tablist" aria-label="Profile sections">${tabs}</div>`;
      }
      body += panels.map(p =>
        `<div class="omni-tabpanel" role="tabpanel" data-ptab="${p.key}"${p.key === activeKey ? '' : ' hidden'}>${p.html}</div>`
      ).join('');
    }

    return `
      <header>
        <div class="portrait">${port}</div>
        <div>
          <h2 id="omni-modal-title">${pEsc(c.name)}</h2>
          ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
        </div>
        <button class="close" aria-label="Close">×</button>
      </header>
      <div class="body">${body}</div>`;
  }

  function openProfile(name) {
    const c = charLookup().get(pNorm(name));
    if (!c) { console.warn('Omni.openProfile: no character for', name); return null; }
    _profileChar = c;
    openModal(renderProfile(c));
    modal.classList.add('omni-profile');
    return c;
  }

  // EN/VI toggle — re-renders only the skills section in place (keeps scroll).
  // `modal` persists across openModal() calls, so one delegated listener suffices.
  modal.addEventListener('click', e => {
    const btn = e.target.closest('.lang-btn');
    if (!btn || !_profileChar) return;
    const lang = btn.dataset.lang;
    if (!SKILL_LANGS.includes(lang) || lang === _skillLang) return;
    _skillLang = lang;
    try { localStorage.setItem('omni-skill-lang', lang); } catch (_) {}
    const sec = document.getElementById('omni-skills-section');
    if (sec) sec.innerHTML = renderSkillsSection(_profileChar);
  });

  // Profile section tabs (Skills / Tier ranks / Rune) — toggle the active
  // button and show the matching panel. One delegated listener on the
  // persistent `modal` covers every profile re-render.
  modal.addEventListener('click', e => {
    const btn = e.target.closest('.ptab-btn');
    if (!btn) return;
    const key = btn.dataset.ptab;
    modal.querySelectorAll('.ptab-btn').forEach(b => {
      const on = b === btn;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on);
    });
    modal.querySelectorAll('.omni-tabpanel').forEach(p => {
      p.hidden = p.dataset.ptab !== key;
    });
  });

  // --- expose to page IIFEs ---
  window.Omni = {
    meta: META,
    pages: PAGES,
    getActivePage,
    readPageHash,
    writePageHash,
    openModal,
    closeModal,
    openProfile,
    characters: CHARS,
    charByName(name) { return charLookup().get(pNorm(name)) || null; },
    tierColor: pTierColor,
    runeColor(key) { return PRIORITY_HEX[key] || 'var(--muted)'; },
    // Fixed per-slot skill glyph markup — shared with the relic modal.
    slotIcon(slot) { return slotIconHTML(slot); },
    // Shared EN/VI skills language — one state for every profile modal (hero
    // and relic). Call with no args to read; with a lang to set + persist.
    skillLang(lang) {
      if (lang !== undefined && SKILL_LANGS.includes(lang) && lang !== _skillLang) {
        _skillLang = lang;
        try { localStorage.setItem('omni-skill-lang', lang); } catch (_) {}
      }
      return _skillLang;
    },
    onTab(slug, handler) {
      document.addEventListener('omni:tab-active', e => {
        if (e.detail.slug === slug) handler(e.detail);
      });
    },
    onModalClosed(handler) {
      document.addEventListener('omni:modal-closed', handler);
    },
  };

  // --- boot ---
  const __omniBoot = () => activate(getActivePage(), { preserveParams: true });
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', __omniBoot, { once: true });
  } else {
    __omniBoot();
  }

  window.addEventListener('hashchange', () => {
    activate(getActivePage(), { preserveParams: true });
  });
})();
</script>

<!-- script: tier-list -->
<script>
(() => {
  const SLUG = 'tier-list';
  const ROOT = document.querySelector('.page-tier-list');
  const DATA = JSON.parse(document.getElementById('data-tier-list').textContent);

  const TIER_BANDS = [
    { id: "SS", label: "SS", colorVar: "--t-ss" },
    { id: "S+", label: "S+", colorVar: "--t-sp" },
    { id: "S",  label: "S",  colorVar: "--t-s"  },
    { id: "S-", label: "S-", colorVar: "--t-sm" },
    { id: "A+", label: "A+", colorVar: "--t-ap" },
    { id: "A",  label: "A",  colorVar: "--t-a"  },
    { id: "A-", label: "A-", colorVar: "--t-am" },
    { id: "B",  label: "B",  colorVar: "--t-b"  },
    { id: "C",  label: "C",  colorVar: "--t-c"  },
    { id: "D",  label: "D",  colorVar: "--t-d"  },
  ];

  function getCssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  const TIER_COLOR = Object.fromEntries(TIER_BANDS.map(t => [t.id, getCssVar(t.colorVar)]));
  function tierColor(t) { return TIER_COLOR[t] || getCssVar('--t-na'); }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  let initialized = false;
  let state = { view: 'tier', mode: 'overall', hero: '' };
  let sortState = { key: 'overall', dir: 'desc' };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    state = {
      view: h.view === 'table' ? 'table' : 'tier',
      mode: h.mode || 'overall',
      hero: h.hero || '',
    };
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.view !== 'tier') out.view = state.view;
    if (state.mode !== 'overall') out.mode = state.mode;
    if (state.hero) out.hero = state.hero;
    Omni.writePageHash(SLUG, out);
  }

  function heroTierFor(h, mode) {
    if (mode === 'overall') return h.overall_band || '';
    return h.tiers[mode] || '';
  }

  const tierViewEl = ROOT.querySelector('#tl-tier-view');
  const tableViewEl = ROOT.querySelector('#tl-table-view');
  const countEl = ROOT.querySelector('#tl-count');

  function renderTier() {
    const buckets = Object.fromEntries(TIER_BANDS.map(b => [b.id, []]));
    for (const h of DATA.heroes) {
      const t = heroTierFor(h, state.mode);
      if (!buckets[t]) buckets[t] = [];
      buckets[t].push(h);
    }
    countEl.textContent = `${DATA.heroes.length} hero`;

    let html = '';
    for (const band of TIER_BANDS) {
      const list = buckets[band.id] || [];
      const tcol = tierColor(band.id);
      html += `<div class="tier-row" style="--tier-color:${tcol}">
        <div class="tier-label">${band.label}</div>
        <div class="tier-grid">`;
      if (!list.length) {
        html += `<div class="empty">— no hero —</div>`;
      } else {
        list.sort((a, b) => (b.overall || 0) - (a.overall || 0));
        for (const h of list) {
          html += cardHTML(h, band.id);
        }
      }
      html += `</div></div>`;
    }
    tierViewEl.innerHTML = html;
  }

  function cardHTML(h, bandId) {
    const tcol = tierColor(bandId);
    const portrait = h.image
      ? `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(h.name)}"
            onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${escapeHtml(initials(h.name))}'}))">`
      : `<div class="initials">${escapeHtml(initials(h.name))}</div>`;
    return `<div class="card" data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}" style="--tier-color:${tcol}">
      <div class="portrait">${portrait}</div>
      <div class="name">${escapeHtml(h.name)}</div>
    </div>`;
  }

  function renderTable() {
    const rows = DATA.heroes.slice();
    countEl.textContent = `${rows.length} hero`;

    const { key, dir } = sortState;
    const orderMap = Object.fromEntries(DATA.tier_order.map((t, i) => [t, i]));
    const cmp = (a, b) => {
      let av, bv;
      if (key === 'name') { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
      else if (key === 'overall') { av = a.overall ?? -1; bv = b.overall ?? -1; }
      else {
        av = orderMap[a.tiers[key]] ?? 999;
        bv = orderMap[b.tiers[key]] ?? 999;
      }
      if (av < bv) return dir === 'asc' ? -1 : 1;
      if (av > bv) return dir === 'asc' ? 1 : -1;
      return 0;
    };
    rows.sort(cmp);

    const groups = [];
    let last = null;
    for (const c of DATA.columns) {
      if (c.group !== last) {
        groups.push({ name: c.group, span: 1 });
        last = c.group;
      } else groups[groups.length - 1].span += 1;
    }
    const sortMark = k => k === sortState.key ? (sortState.dir === 'asc' ? 'sort-asc' : 'sort-desc') : '';

    let html = `<table class="t"><thead>
      <tr>
        <th rowspan="2" class="sortable ${sortMark('name')}" data-sort="name" style="text-align:left;padding-left:8px">Hero</th>
        <th rowspan="2" class="sortable ${sortMark('overall')}" data-sort="overall">Overall</th>
        ${groups.map(g => `<th colspan="${g.span}" class="group">${escapeHtml(g.name)}</th>`).join('')}
        <th rowspan="2">Notes</th>
      </tr>
      <tr>
        ${DATA.columns.map(c => `<th class="sortable ${sortMark(c.key)}" data-sort="${c.key}">${escapeHtml(c.label)}</th>`).join('')}
      </tr>
    </thead><tbody>`;

    for (const h of rows) {
      const port = h.image
        ? `<img loading="lazy" src="${escapeHtml(h.image)}" alt=""
             onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials-sm',textContent:'${escapeHtml(initials(h.name))}'}))">`
        : `<div class="initials-sm">${escapeHtml(initials(h.name))}</div>`;
      html += `<tr><td class="name-cell">
        <span class="row-portrait" data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}">${port}</span>
      </td>
      <td>${h.overall != null ? `<span class="tier-chip" style="background:${tierColor(h.overall_band)}">${h.overall.toFixed(2)}</span>` : '—'}</td>`;
      for (const c of DATA.columns) {
        const t = h.tiers[c.key] || '';
        const klass = t ? '' : 'empty';
        html += `<td><span class="tier-chip ${klass}" style="${t ? `background:${tierColor(t)}` : ''}">${escapeHtml(t || '–')}</span></td>`;
      }
      html += `<td style="text-align:left; white-space: normal; max-width: 280px; color:var(--body-color); font-size:11.5px">${escapeHtml(h.notes || '')}</td>`;
      html += `</tr>`;
    }

    html += `</tbody></table>`;
    tableViewEl.innerHTML = html;
  }

  function render() {
    if (state.view === 'tier') renderTier();
    else renderTable();
  }

  function openHero(name) {
    if (!Omni.openProfile(name)) return;
    state.hero = name;
    syncHash();
  }

  function applyState() {
    ROOT.querySelector('#tl-mode').value = state.mode;
    for (const b of ROOT.querySelectorAll('#tl-view-seg button')) {
      b.classList.toggle('active', b.dataset.view === state.view);
    }
    tierViewEl.hidden = state.view !== 'tier';
    tableViewEl.hidden = state.view !== 'table';
    ROOT.querySelector('#tl-mode-wrap').style.display = state.view === 'tier' ? '' : 'none';
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    const modeSel = ROOT.querySelector('#tl-mode');
    for (const col of DATA.columns) {
      const opt = document.createElement('option');
      opt.value = col.key;
      opt.textContent = `${col.group ? col.group + ' · ' : ''}${col.label}`;
      modeSel.appendChild(opt);
    }

    modeSel.addEventListener('change', e => {
      state.mode = e.target.value;
      syncHash();
      render();
    });
    ROOT.querySelector('#tl-view-seg').addEventListener('click', e => {
      const btn = e.target.closest('button[data-view]');
      if (!btn) return;
      state.view = btn.dataset.view;
      for (const b of ROOT.querySelectorAll('#tl-view-seg button')) {
        b.classList.toggle('active', b === btn);
      }
      tierViewEl.hidden = state.view !== 'tier';
      tableViewEl.hidden = state.view !== 'table';
      ROOT.querySelector('#tl-mode-wrap').style.display = state.view === 'tier' ? '' : 'none';
      syncHash();
      render();
    });

    ROOT.addEventListener('click', e => {
      const opener = e.target.closest('.card, .row-portrait');
      if (opener && opener.dataset.name) {
        openHero(opener.dataset.name);
        return;
      }
      const th = e.target.closest('th.sortable');
      if (th) {
        const k = th.dataset.sort;
        if (sortState.key === k) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
        else { sortState.key = k; sortState.dir = k === 'name' ? 'asc' : 'desc'; }
        renderTable();
      }
    });
    ROOT.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const opener = e.target.closest('.card[data-name], .row-portrait[data-name]');
      if (opener) { e.preventDefault(); openHero(opener.dataset.name); }
    });
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    applyState();
    render();
    if (state.hero) openHero(state.hero);
  });

  Omni.onModalClosed(() => {
    if (state.hero) {
      state.hero = '';
      syncHash();
    }
  });
})();
</script>

<!-- script: beginners-priority -->
<script>
(() => {
  const SLUG = 'beginners-priority';
  const ROOT = document.querySelector('.page-beginners-priority');
  const DATA = JSON.parse(document.getElementById('data-beginners-priority').textContent);

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function slugify(s) {
    return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }

  const sections = DATA.sections.map(s => ({ ...s, slug: slugify(s.title) }));
  const totalHeroes = sections.reduce((acc, s) => acc + s.heroes.length, 0);

  let initialized = false;
  let state = { section: 'all', hero: '' };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    state = { section: h.section || 'all', hero: h.hero || '' };
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.section !== 'all') out.section = state.section;
    if (state.hero) out.hero = state.hero;
    Omni.writePageHash(SLUG, out);
  }

  function starsHTML(h) {
    const parts = [];
    if (h.minimal_stars != null) {
      parts.push(`<span class="pair"><span class="lbl">Min</span><span class="val min">${h.minimal_stars}★</span></span>`);
    }
    if (h.ideal_stars != null) {
      parts.push(`<span class="pair"><span class="lbl">Ideal</span><span class="val ideal">${h.ideal_stars}★</span></span>`);
    }
    return parts.length ? `<span class="stars">${parts.join('')}</span>` : '';
  }

  function portraitHTML(h) {
    const safe = escapeHtml(initials(h.name));
    if (h.image) {
      return `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(h.name)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`;
    }
    return `<div class="initials">${safe}</div>`;
  }

  function pcardHTML(h) {
    return `<div class="pcard" data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}">
      <div class="portrait" data-open="${escapeHtml(h.name)}">${portraitHTML(h)}</div>
      <div class="body">
        <div class="row1">
          <span class="name" data-open="${escapeHtml(h.name)}">${escapeHtml(h.name)}</span>
          ${h.tag ? `<span class="tag">${escapeHtml(h.tag)}</span>` : ''}
          ${starsHTML(h)}
        </div>
        ${h.summary ? `<div class="summary">${escapeHtml(h.summary)}</div>` : ''}
        ${h.source ? `<div class="meta">
          <div class="chunk"><span class="k">Source</span><span class="v">${escapeHtml(h.source)}</span></div>
        </div>` : ''}
        ${h.notes ? `<div class="notes">${escapeHtml(h.notes)}</div>` : ''}
      </div>
    </div>`;
  }

  const listView = ROOT.querySelector('#bp-list-view');
  const countEl = ROOT.querySelector('#bp-count');

  function render() {
    let shown = 0;
    let html = '';
    for (const s of sections) {
      if (state.section !== 'all' && state.section !== s.slug) continue;
      const heroes = s.heroes;
      shown += heroes.length;
      html += `<section class="section">
        <div class="section-head">
          <h2>${escapeHtml(s.title)}</h2>
          <span class="pill">${heroes.length} hero${heroes.length === 1 ? '' : 'es'}</span>
        </div>`;
      if (s.intro) html += `<div class="section-intro">${escapeHtml(s.intro)}</div>`;
      html += `<div class="priority-list">${heroes.map(pcardHTML).join('')}</div>`;
      html += `</section>`;
    }
    if (!shown) {
      html = `<div class="empty-result">Không có hero nào khớp với bộ lọc hiện tại.</div>`;
    }
    listView.innerHTML = html;
    countEl.textContent = `${shown}/${totalHeroes} hero`;
  }

  function openHero(name) {
    if (!Omni.openProfile(name)) return;
    state.hero = name;
    syncHash();
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    const seg = ROOT.querySelector('#bp-section-seg');
    for (const s of sections) {
      const btn = document.createElement('button');
      btn.dataset.section = s.slug;
      btn.textContent = s.title.length > 28 ? s.title.slice(0, 26) + '…' : s.title;
      btn.title = s.title;
      seg.appendChild(btn);
    }

    seg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-section]');
      if (!btn) return;
      state.section = btn.dataset.section;
      for (const b of seg.querySelectorAll('button')) {
        b.classList.toggle('active', b === btn);
      }
      syncHash();
      render();
    });

    ROOT.addEventListener('click', e => {
      const opener = e.target.closest('[data-open]');
      if (opener) openHero(opener.dataset.open);
    });
    ROOT.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const pcard = e.target.closest('.pcard[data-name]');
      if (pcard) { e.preventDefault(); openHero(pcard.dataset.name); }
    });
  }

  function applyState() {
    const seg = ROOT.querySelector('#bp-section-seg');
    for (const b of seg.querySelectorAll('button')) {
      b.classList.toggle('active', b.dataset.section === state.section);
    }
    if (state.section !== 'all' && !sections.some(s => s.slug === state.section)) {
      state.section = 'all';
      for (const b of seg.querySelectorAll('button')) {
        b.classList.toggle('active', b.dataset.section === 'all');
      }
    }
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    applyState();
    render();
    if (state.hero) openHero(state.hero);
  });

  Omni.onModalClosed(() => {
    if (state.hero) {
      state.hero = '';
      syncHash();
    }
  });
})();
</script>

<!-- script: endgame-priority -->
<script>
(() => {
  const SLUG = 'endgame-priority';
  const ROOT = document.querySelector('.page-endgame-priority');
  const DATA = JSON.parse(document.getElementById('data-endgame-priority').textContent);

  // Map priority tier label → CSS var on the shared (vivid) palette.
  const TIER_COLORS = {
    'Top Priority':  'var(--t-ss)',
    'High':          'var(--t-s)',
    'Middle - High': 'var(--t-sm)',
    'Middle':        'var(--t-a)',
    'Low':           'var(--t-b)',
  };

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function slugify(s) {
    return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }
  function tierColor(title) {
    return TIER_COLORS[title] || 'var(--accent)';
  }

  const sections = DATA.sections.map(s => ({
    ...s,
    slug: slugify(s.title),
    color: tierColor(s.title),
  }));
  const totalHeroes = sections.reduce((acc, s) => acc + s.heroes.length, 0);

  let initialized = false;
  let state = { section: 'all', view: 'compact', hero: '' };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    state = {
      section: h.section || 'all',
      view: h.view === 'full' ? 'full' : 'compact',
      hero: h.hero || '',
    };
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.section !== 'all') out.section = state.section;
    if (state.view === 'full') out.view = 'full';
    if (state.hero) out.hero = state.hero;
    Omni.writePageHash(SLUG, out);
  }

  function portraitHTML(h) {
    const safe = escapeHtml(initials(h.name));
    if (h.image) {
      return `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(h.name)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`;
    }
    return `<div class="initials">${safe}</div>`;
  }

  // Rune-priority key → human label, sourced from the shared character data.
  const RUNE_LABEL = (() => {
    const m = {};
    for (const p of (Omni.characters && Omni.characters.priorities) || []) m[p.key] = p.label;
    return m;
  })();

  // Band under the avatar: left = overall Tier band as TEXT on its band color,
  // right = rune-priority color swatch. Cross-referenced from characters.json at
  // runtime by name. Rune-only hero → full-width swatch; no match → no band.
  function bandHTML(h) {
    const c = Omni.charByName ? Omni.charByName(h.name) : null;
    if (!c) return '';
    const band = c.tier && c.tier.overall_band;
    const rp = c.rune_priority && c.rune_priority[0];
    const parts = [];
    if (band) {
      parts.push(`<span class="tr-tier" style="background:${Omni.tierColor(band)}" title="Tier: ${escapeHtml(band)}">${escapeHtml(band)}</span>`);
    }
    if (rp && rp.priority) {
      const label = RUNE_LABEL[rp.priority] || rp.priority;
      parts.push(`<span class="tr-rune${band ? '' : ' solo'}" style="background:${Omni.runeColor(rp.priority)}" title="Rune: ${escapeHtml(label)}"></span>`);
    }
    if (!parts.length) return '';
    return `<div class="tr-band">${parts.join('')}</div>`;
  }

  function pcardHTML(h, sectionTitle) {
    return `<div class="pcard" data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}">
      <div class="avatar-col">
        <div class="portrait" data-open="${escapeHtml(h.name)}">${portraitHTML(h)}</div>
        ${bandHTML(h)}
      </div>
      <div class="body">
        <div class="row1">
          <span class="name" data-open="${escapeHtml(h.name)}">${escapeHtml(h.name)}</span>
          <span class="tier-badge">${escapeHtml(sectionTitle)}</span>
          ${h.fair_stars ? `<span class="fair"><span class="lbl">Fair ★</span><span class="val">${escapeHtml(h.fair_stars)}</span></span>` : ''}
        </div>
        ${h.summary ? `<div class="summary">${escapeHtml(h.summary)}</div>` : ''}
        ${h.source ? `<div class="meta">
          <div class="chunk"><span class="k">Source</span><span class="v">${escapeHtml(h.source)}</span></div>
        </div>` : ''}
      </div>
    </div>`;
  }

  function pcardCompactHTML(h, sectionTitle) {
    return `<div class="pcard compact" data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}">
      <div class="portrait" data-open="${escapeHtml(h.name)}">${portraitHTML(h)}</div>
      ${bandHTML(h)}
    </div>`;
  }

  const listView = ROOT.querySelector('#ep-list-view');
  const countEl = ROOT.querySelector('#ep-count');

  function render() {
    const compact = state.view === 'compact';
    let shown = 0;
    let html = '';
    for (const s of sections) {
      if (state.section !== 'all' && state.section !== s.slug) continue;
      const heroes = s.heroes;
      shown += heroes.length;
      html += `<section class="section" style="--tier-color: ${s.color}">
        <div class="section-head">
          <span class="tier-chip">${escapeHtml(s.title)}</span>
          <h2>${heroes.length} hero${heroes.length === 1 ? '' : 'es'}</h2>
        </div>`;
      const card = compact ? pcardCompactHTML : pcardHTML;
      html += `<div class="priority-list${compact ? ' compact' : ''}">${heroes.map(h => card(h, s.title)).join('')}</div>`;
      html += `</section>`;
    }
    if (!shown) {
      html = `<div class="empty-result">Không có hero nào khớp với bộ lọc hiện tại.</div>`;
    }
    listView.innerHTML = html;
    countEl.textContent = `${shown}/${totalHeroes} hero`;
  }

  function openHero(name) {
    if (!Omni.openProfile(name)) return;
    state.hero = name;
    syncHash();
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    const seg = ROOT.querySelector('#ep-section-seg');
    for (const s of sections) {
      const btn = document.createElement('button');
      btn.dataset.section = s.slug;
      btn.textContent = s.title.length > 28 ? s.title.slice(0, 26) + '…' : s.title;
      btn.title = s.title;
      seg.appendChild(btn);
    }

    seg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-section]');
      if (!btn) return;
      state.section = btn.dataset.section;
      for (const b of seg.querySelectorAll('button')) {
        b.classList.toggle('active', b === btn);
      }
      syncHash();
      render();
    });

    const viewSeg = ROOT.querySelector('#ep-view-seg');
    viewSeg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-view]');
      if (!btn) return;
      state.view = btn.dataset.view;
      for (const b of viewSeg.querySelectorAll('button')) {
        b.classList.toggle('active', b === btn);
      }
      syncHash();
      render();
    });

    ROOT.addEventListener('click', e => {
      const opener = e.target.closest('[data-open]');
      if (opener) openHero(opener.dataset.open);
    });
    ROOT.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const pcard = e.target.closest('.pcard[data-name]');
      if (pcard) { e.preventDefault(); openHero(pcard.dataset.name); }
    });
  }

  function applyState() {
    const seg = ROOT.querySelector('#ep-section-seg');
    for (const b of seg.querySelectorAll('button')) {
      b.classList.toggle('active', b.dataset.section === state.section);
    }
    const viewSeg = ROOT.querySelector('#ep-view-seg');
    for (const b of viewSeg.querySelectorAll('button')) {
      b.classList.toggle('active', b.dataset.view === state.view);
    }
    if (state.section !== 'all' && !sections.some(s => s.slug === state.section)) {
      state.section = 'all';
      for (const b of seg.querySelectorAll('button')) {
        b.classList.toggle('active', b.dataset.section === 'all');
      }
    }
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    applyState();
    render();
    if (state.hero) openHero(state.hero);
  });

  Omni.onModalClosed(() => {
    if (state.hero) {
      state.hero = '';
      syncHash();
    }
  });
})();
</script>

    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  let initialized = false;
  let state = { sub: 'priority', hero: '' };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    const sub = h.sub === 'notes' ? 'notes' : 'priority';
    state = { sub, hero: h.hero || '' };
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.sub !== 'priority') out.sub = state.sub;
    if (state.hero) out.hero = state.hero;
    Omni.writePageHash(SLUG, out);
  }

  function openHero(name) {
    if (!Omni.openProfile(name)) return;
    state.hero = name;
    syncHash();
  }

  // ── Priority sub-tab: tier blocks of priority-framed portraits ───────────
  function portraitInnerHTML(h) {
    const display = h.name || '?';
    const safe = escapeHtml(initials(display));
    if (h.image) {
      return `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(display)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`;
    }
    return `<div class="initials">${safe}</div>`;
  }
  function portraitHTML(h) {
    const color = PRIORITY_COLOR[h.priority] || 'var(--border-strong)';
    const title = h.name ? `${h.name}${h.priority ? ' · ' + h.priority : ''}` : 'unidentified';
    const nameAttr = h.name
      ? ` data-name="${escapeHtml(h.name)}" role="button" tabindex="0" aria-label="${escapeHtml(h.name)}"`
      : '';
    return `<div class="portrait"${nameAttr} style="--c:${color}" title="${escapeHtml(title)}">${portraitInnerHTML(h)}</div>`;
  }
  function tierHTML(t) {
    return `<section class="tier" data-row="${t.row}">
      <strong>${escapeHtml(t.label)}</strong>
      ${t.notes ? `<div class="tier-notes">${escapeHtml(t.notes)}</div>` : ''}
      <div class="portraits">${t.heroes.map(portraitHTML).join('')}</div>
    </section>`;
  }
  function legendHTML() {
    return DATA.priorities.map(s => {
      const color = PRIORITY_COLOR[s.key] || 'var(--text-faint)';
      return `<span class="pill"><span class="swatch" style="--c:${color}"></span>${escapeHtml(s.label)}</span>`;
    }).join('');
  }
  function renderPriority() {
    ROOT.querySelector('#rp-legend').innerHTML = legendHTML();
    ROOT.querySelector('#rp-tiers').innerHTML = DATA.tiers.map(tierHTML).join('');
  }

  // ── Notes sub-tab: one wide rune-build table, sticky hero column ─────────
  function noteAvatarHTML(h) {
    const safe = escapeHtml(initials(h.name));
    if (h.image) {
      return `<img loading="lazy" src="${escapeHtml(h.image)}" alt="${escapeHtml(h.name)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`;
    }
    return `<div class="initials">${safe}</div>`;
  }
  function impactPillHTML(impact) {
    if (!impact) {
      return `<span class="impact-pill" style="--c:var(--rn-none)"><span class="code">—</span></span>`;
    }
    const c = IMPACT_COLOR[impact.code] || 'var(--rn-none)';
    return `<span class="impact-pill" style="--c:${c}">
      <span class="code">${escapeHtml(impact.code)}</span>
      <span>${escapeHtml(impact.label)}</span>
    </span>`;
  }
  function uniquePillHTML(v) {
    if (v === true) return `<span class="pill yes">UNI</span>`;
    if (v === false) return `<span class="pill no">—</span>`;
    return '';
  }
  function rowHTML(h) {
    return `<tr data-name="${escapeHtml(h.name)}" tabindex="0" aria-label="${escapeHtml(h.name)}">
      <td class="hero-col">
        <div class="hero">
          <div class="portrait">${noteAvatarHTML(h)}</div>
        </div>
      </td>
      <td class="rune-type">${escapeHtml(h.rune_type)}</td>
      <td class="secondary">${escapeHtml(h.secondary_type)}</td>
      <td class="substat">${escapeHtml(h.substat_pre_11)}</td>
      <td class="substat">${escapeHtml(h.substat_post_11)}</td>
      <td class="unique">${uniquePillHTML(h.roll_unique)}</td>
      <td class="impact">${impactPillHTML(h.impact)}</td>
      <td class="reasoning">${escapeHtml(h.reasoning)}</td>
      <td class="if-needed">${escapeHtml(h.if_needed)}</td>
    </tr>`;
  }
  function renderNotes() {
    const tbody = ROOT.querySelector('#rn-tbody');
    tbody.innerHTML = NOTES.heroes.map(rowHTML).join('');
    ROOT.querySelector('#rn-empty').hidden = NOTES.heroes.length > 0;
  }

  // ── Sub-tab switch ───────────────────────────────────────────────────────
  function setActiveBtn(seg, predicate) {
    for (const b of seg.querySelectorAll('button')) b.classList.toggle('active', predicate(b));
  }
  function applySub() {
    setActiveBtn(ROOT.querySelector('#rune-subtabs'), b => b.dataset.sub === state.sub);
    for (const p of ROOT.querySelectorAll('.subpanel')) p.hidden = p.dataset.panel !== state.sub;
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    renderPriority();
    renderNotes();

    const tiersEl = ROOT.querySelector('#rp-tiers');
    tiersEl.addEventListener('click', e => {
      const p = e.target.closest('.portrait[data-name]');
      if (p && p.dataset.name) openHero(p.dataset.name);
    });
    tiersEl.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const p = e.target.closest('.portrait[data-name]');
      if (p && p.dataset.name) { e.preventDefault(); openHero(p.dataset.name); }
    });

    const tbody = ROOT.querySelector('#rn-tbody');
    tbody.addEventListener('click', e => {
      const tr = e.target.closest('tr[data-name]');
      if (tr && tr.dataset.name) openHero(tr.dataset.name);
    });
    tbody.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const tr = e.target.closest('tr[data-name]');
      if (tr && tr.dataset.name) { e.preventDefault(); openHero(tr.dataset.name); }
    });

    // Sub-tab switch (Priority | Notes)
    ROOT.querySelector('#rune-subtabs').addEventListener('click', e => {
      const btn = e.target.closest('button[data-sub]');
      if (!btn || btn.dataset.sub === state.sub) return;
      state.sub = btn.dataset.sub;
      syncHash();
      applySub();
    });
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    applySub();
    if (state.hero) openHero(state.hero);
  });

  Omni.onModalClosed(() => {
    if (state.hero) {
      state.hero = '';
      syncHash();
    }
  });
})();
</script>

<!-- script: relics-priority -->
<script>
(() => {
  const SLUG = 'relics-priority';
  const ROOT = document.querySelector('.page-relics-priority');
  const DATA = JSON.parse(document.getElementById('data-relics-priority').textContent);
  const TIER = JSON.parse(document.getElementById('data-relics-tier').textContent);
  const SKILLS = JSON.parse(document.getElementById('data-relic-skills').textContent);

  // Grade → rank for sorting a mode column (S+ best … D worst; blank last).
  const GRADE_RANK = { 'S+':9,'S':8,'S-':7,'A+':6,'A':5,'A-':4,'B':3,'C':2,'D':1 };
  function gradeRank(g){ return GRADE_RANK[(g||'').trim()] || 0; }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function initials(name) {
    const parts = (name || '').trim().split(/\s+/);
    if (!parts.length || !parts[0]) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  function slugify(s) {
    return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }
  // Short filter-chip labels for the four known sections; graceful fallback.
  function shortLabel(title) {
    const t = (title || '').toLowerCase();
    if (t.includes('justified')) return 'Justified';
    if (t.includes('rebates & extra')) return 'Rebates';
    if (t.includes('pvp road')) return 'PvP Road';
    if (t.includes('niche')) return 'Niche';
    return title.length > 16 ? title.slice(0, 15) + '…' : title;
  }
  function isSkip(notes) { return /don'?t\s*get\s*it/i.test(notes || ''); }

  // Focus column → badge class + label. "PvP > PvE" gets its own amber chip.
  function focusBadge(focus) {
    const f = (focus || '').trim();
    if (!f) return '';
    const key = f.toLowerCase();
    let cls = 'focus-both';
    if (key === 'pvp') cls = 'focus-pvp';
    else if (key === 'pve') cls = 'focus-pve';
    else if (key === 'both') cls = 'focus-both';
    else if (key.includes('>')) cls = 'focus-pvppve';
    return `<span class="badge ${cls}">${escapeHtml(f)}</span>`;
  }
  function spendBadge(spending) {
    const s = (spending || '').trim();
    if (!s) return '';
    const cls = /whale/i.test(s) ? 'spend-whale' : 'spend-justified';
    return `<span class="badge ${cls}">${escapeHtml(s)}</span>`;
  }

  // Render the breakpoints string, wrapping each number that the sheet coloured
  // red (carried in r.breakpoints_red) in a red span.
  function breaksHTML(r) {
    const txt = r.breakpoints || '';
    if (!txt) return '';
    const red = new Set(r.breakpoints_red || []);
    const html = escapeHtml(txt).replace(/\d+/g, n =>
      red.has(n) ? `<span class="num red">${n}</span>` : `<span class="num">${n}</span>`);
    return `<div class="breaks"><span class="lbl">★ Mốc</span><span class="val">${html}</span></div>`;
  }

  function iconHTML(r) {
    const safe = escapeHtml(initials(r.name));
    if (r.image) {
      return `<div class="ricon"><img loading="lazy" src="${escapeHtml(r.image)}" alt="${escapeHtml(r.name)}"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))"></div>`;
    }
    return `<div class="ricon"><div class="initials">${safe}</div></div>`;
  }

  function rcardHTML(r) {
    const skip = isSkip(r.notes);
    const skipBadge = skip ? `<span class="badge skip">Skip</span>` : '';
    const badges = focusBadge(r.focus) + spendBadge(r.spending) + skipBadge;
    const hasInfo = r.notes || r.source || r.breakpoints || r.focus || r.spending;
    return `<div class="rcard${skip ? ' skip' : ''}" data-name="${escapeHtml(r.name)}"
        role="button" tabindex="0" aria-label="Xem hồ sơ ${escapeHtml(r.name)}">
      ${iconHTML(r)}
      <div class="rbody">
        <div class="row1">
          <span class="name">${escapeHtml(r.name)}</span>
          ${badges ? `<span class="badges">${badges}</span>` : ''}
        </div>
        ${breaksHTML(r)}
        ${r.notes ? `<div class="notes${skip ? ' skip' : ''}">${escapeHtml(r.notes)}</div>` : ''}
        ${r.source ? `<div class="source"><span class="lbl">Nguồn</span><span class="val">${escapeHtml(r.source)}</span></div>` : ''}
        ${!hasInfo ? `<div class="tbd">Chưa cập nhật.</div>` : ''}
      </div>
    </div>`;
  }

  const sections = DATA.sections.map(s => ({ ...s, slug: slugify(s.title) }));
  const listView = ROOT.querySelector('#rl-list-view');

  // Merged relic catalogue for the profile modal: Tier List is the fuller
  // base (per-mode grades, overall, ★ ranges, note); the Priority List joins
  // in section/source/breakpoints/focus/spending/notes. Keyed by slug(name)
  // so either entry point resolves the same record. Each relic shows only the
  // panels it actually has data for.
  const RELIC_PROFILES = (() => {
    const map = new Map();
    for (const r of TIER.relics) {
      map.set(slugify(r.name), {
        name: r.name, image: r.image || '',
        overall: r.overall, grades: r.grades || {}, note: r.note,
      });
    }
    for (const s of DATA.sections) {
      for (const r of s.relics) {
        const k = slugify(r.name);
        const rec = map.get(k) || { name: r.name, image: '', grades: {} };
        if (!rec.image && r.image) rec.image = r.image;
        rec.section = s.title;
        rec.source = r.source;
        rec.breakpoints = r.breakpoints;
        rec.breakpoints_red = r.breakpoints_red;
        rec.focus = r.focus;
        rec.spending = r.spending;
        rec.notes = r.notes;
        map.set(k, rec);
      }
    }
    // Bilingual skill profiles (relic_skills.json) — keyed by the relic's
    // exact tier-list name; an unmatched key is a curation error, warn loudly.
    for (const [name, sp] of Object.entries(SKILLS.relics || {})) {
      const rec = map.get(slugify(name));
      if (!rec) { console.warn('relic_skills: no relic named', name); continue; }
      rec.skill_profile = sp;
    }
    return map;
  })();

  let initialized = false;
  let state = { sub: 'priority', section: 'all', tsort: 'overall' };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    const sub = h.sub === 'tier' ? 'tier' : 'priority';
    const tsort = (h.tsort === 'overall' || TIER.columns.some(c => c.key === h.tsort))
      ? h.tsort : 'overall';
    state = { sub, section: h.section || 'all', tsort };
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.sub !== 'priority') out.sub = state.sub;
    if (state.section !== 'all') out.section = state.section;
    if (state.tsort !== 'overall') out.tsort = state.tsort;
    Omni.writePageHash(SLUG, out);
  }

  function render() {
    let shown = 0;
    let html = '';
    for (const s of sections) {
      if (state.section !== 'all' && state.section !== s.slug) continue;
      const relics = s.relics;
      if (!relics.length) continue;
      shown += relics.length;
      html += `<section class="section">
        <div class="section-head"><h2>${escapeHtml(s.title)}</h2></div>`;
      if (s.subtitle) html += `<div class="section-note">${escapeHtml(s.subtitle)}</div>`;
      html += `<div class="relic-list">${relics.map(rcardHTML).join('')}</div>`;
      html += `</section>`;
    }
    if (!shown) {
      html += `<div class="empty-result">Không có relic nào khớp với bộ lọc hiện tại.</div>`;
    }
    listView.innerHTML = html;
  }

  // ── Tier List view ───────────────────────────────────────────────────────
  const tableView = ROOT.querySelector('#rt-table-view');

  function gradeCellHTML(g) {
    const v = (g || '').trim();
    if (!v) return `<td class="g-cell"><span class="g empty">–</span></td>`;
    return `<td class="g-cell"><span class="g" style="background:${Omni.tierColor(v)}">${escapeHtml(v)}</span></td>`;
  }

  function tierIconHTML(r) {
    const safe = escapeHtml(initials(r.name));
    const inner = r.image
      ? `<img loading="lazy" src="${escapeHtml(r.image)}" alt=""
          onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`
      : `<div class="initials">${safe}</div>`;
    return `<span class="ic">${inner}</span>`;
  }

  // Overall = numeric desc; a mode = grade rank desc, then overall as tie-break.
  // Stable via the original index so equal keys keep the sheet's ranking.
  function sortedRelics() {
    const key = state.tsort;
    const ov = x => parseFloat(x.r.overall) || 0;
    const arr = TIER.relics.map((r, i) => ({ r, i }));
    if (key === 'overall') {
      arr.sort((a, b) => ov(b) - ov(a) || a.i - b.i);
    } else {
      arr.sort((a, b) =>
        gradeRank(b.r.grades[key]) - gradeRank(a.r.grades[key]) || ov(b) - ov(a) || a.i - b.i);
    }
    return arr.map(x => x.r);
  }

  function renderTier() {
    const cols = TIER.columns;
    const head = cols.map(c =>
      `<th class="g-cell${state.tsort === c.key ? ' sorted' : ''}" data-sort="${c.key}" title="${escapeHtml(c.label)}">${escapeHtml(c.short)}</th>`
    ).join('');
    const rows = sortedRelics().map(r => {
      const grades = cols.map(c => gradeCellHTML(r.grades[c.key])).join('');
      return `<tr data-name="${escapeHtml(r.name)}">
        <td class="c-relic"><div class="rt-relic">${tierIconHTML(r)}<span class="nm">${escapeHtml(r.name)}</span></div></td>
        ${grades}
      </tr>`;
    }).join('');
    tableView.innerHTML = `<div class="rt-scroll"><table class="rt-table">
      <thead><tr><th class="c-relic">Relic</th>${head}</tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  function setSort(key) {
    if (key !== 'overall' && !TIER.columns.some(c => c.key === key)) return;
    state.tsort = key;
    setActiveBtn(ROOT.querySelector('#rt-sort-seg'), b => b.dataset.sort === key);
    syncHash();
    renderTier();
  }

  // Breakpoints string with the sheet's red numbers preserved, scoped to the
  // modal via .rp-num (page CSS can't reach inside the shell modal).
  function breaksProfileHTML(r) {
    const red = new Set(r.breakpoints_red || []);
    return escapeHtml(r.breakpoints).replace(/\d+/g, n =>
      red.has(n) ? `<span class="rp-num red">${n}</span>` : n);
  }

  // ── Relic skills (bilingual, relic_skills.json) ──────────────────────────
  // Same card markup/classes as the hero modal's renderSkillProfile, so the
  // shell's .omni-profile .skill styles apply as-is. Language state lives in
  // the shell (Omni.skillLang — shared with the hero modal); only re-rendering
  // the relic section is handled here.
  const SLOT_LABEL = { ultimate: 'Ultimate', link: 'Link', active: 'Active', passive: 'Passive' };
  function skillText(v) {
    if (v == null) return '';
    if (typeof v === 'string') return v;
    return v[Omni.skillLang()] || v.en || v.vi || '';
  }

  function relicSkillsHTML(sp) {
    const cur = Omni.skillLang();
    const langBtn = (code, label) =>
      `<button type="button" class="lang-btn${cur === code ? ' active' : ''}" ` +
      `data-lang="${code}" aria-pressed="${cur === code}">${label}</button>`;
    const toggle = `<div class="seg lang-toggle" role="group" aria-label="Skill language">` +
      `${langBtn('en', 'EN')}${langBtn('vi', 'VI')}</div>`;

    // Number multiple passive cards (Passive 1 / Passive 2) to match the in-game layout.
    const slotOf = s => SLOT_LABEL[s.slot] ? s.slot : (s.type === 'passive' ? 'passive' : 'active');
    const passiveCount = (sp.skills || []).filter(s => slotOf(s) === 'passive').length;
    let passiveIdx = 0;
    let cards = '';
    for (const s of (sp.skills || [])) {
      const slot = slotOf(s);
      let label = SLOT_LABEL[slot];
      if (slot === 'passive' && passiveCount > 1) label = `Passive ${++passiveIdx}`;
      const cd = s.cd != null ? `<span class="s-type cd">CD ${escapeHtml(String(s.cd))}</span>` : '';
      const unlock = s.unlock ? `<span class="s-unlock">${escapeHtml(skillText(s.unlock))}</span>` : '';
      let levels = '';
      if (s.levels && s.levels.length) {
        let rows = '';
        for (const lv of s.levels) {
          rows += `<div class="skill-level"><span class="lv-unlock">${escapeHtml(skillText(lv.unlock))}</span> — ` +
            `<span class="lv-text">${escapeHtml(skillText(lv.text))}</span></div>`;
        }
        levels = `<div class="skill-levels">${rows}</div>`;
      }
      cards += `<div class="skill">${Omni.slotIcon(slot)}` +
        `<div class="s-body"><div class="s-head">` +
        `<span class="s-name">${escapeHtml(skillText(s.name))}</span>` +
        `<span class="s-type ${slot}">${label}</span>${cd}</div>` +
        `${unlock}<div class="s-desc">${escapeHtml(skillText(s.description))}</div>${levels}</div></div>`;
    }

    return `<div class="skills-head"><h3>Skills</h3>${toggle}</div>` +
      `<div class="skills">${cards}</div>`;
  }

  // Build the relic profile modal — same shape/style as Omni.openProfile
  // (header + optional .profile-tabs + scrollable .omni-tabpanel). Panels are
  // added only when the relic has that data, mirroring the hero profile's
  // assemble logic so the shell's .ptab-btn switch listener drives them.
  function relicProfileHTML(r) {
    const safe = escapeHtml(initials(r.name));
    const port = r.image
      ? `<img src="${escapeHtml(r.image)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'initials',textContent:'${safe}'}))">`
      : `<div class="initials">${safe}</div>`;

    const badges = [];
    if (r.overall) badges.push(`<span class="pill score">Overall ${escapeHtml(r.overall)}</span>`);
    if (r.focus) badges.push(`<span class="pill">${escapeHtml(r.focus)}</span>`);
    if (r.spending) badges.push(`<span class="pill">${escapeHtml(r.spending)}</span>`);
    if (isSkip(r.notes)) badges.push(`<span class="pill">Skip</span>`);

    const panels = [];

    // Skills panel — listed first so it wins as the default active tab,
    // matching the hero profile modal. Re-rendered in place on EN/VI toggle.
    if (r.skill_profile) {
      panels.push({ key: 'skills', label: 'Skills',
        html: `<div id="relic-skills-section">${relicSkillsHTML(r.skill_profile)}</div>` });
    }

    // Info panel — per-mode grades, ★ breakpoints, evaluation + investment
    // notes. ★ Mốc = breakpoints from the Priority list (relics-priority.json).
    // The tier list's min_star/ideal_star are stale and intentionally not shown.
    const gradeKeys = Object.keys(r.grades || {});
    if (gradeKeys.length || r.breakpoints || r.note || r.notes) {
      let html = '';
      if (gradeKeys.length) {
        const items = TIER.columns.map(c => {
          const v = ((r.grades && r.grades[c.key]) || '').trim();
          const chip = v
            ? `<span class="tier-chip" style="background:${Omni.tierColor(v)}">${escapeHtml(v)}</span>`
            : `<span class="tier-chip empty">–</span>`;
          return `<div class="item"><span class="lbl">${escapeHtml(c.label)}</span>${chip}</div>`;
        }).join('');
        html += `<h3>Grades theo chế độ</h3><div class="ranks">${items}</div>`;
      }
      if (r.breakpoints) html += `<h3>★ Mốc</h3><div class="block breaks-block">${breaksProfileHTML(r)}</div>`;
      if (r.note) html += `<h3>Đánh giá</h3><div class="block">${escapeHtml(r.note)}</div>`;
      if (r.notes) html += `<h3>Ghi chú</h3><div class="block">${escapeHtml(r.notes)}</div>`;
      panels.push({ key: 'tier', label: 'Info', html });
    }

    let body;
    if (!panels.length) {
      body = `<div class="omni-tabpanel"><div class="block empty">Chưa có dữ liệu cho relic này.</div></div>`;
    } else {
      const activeKey = panels[0].key;
      body = '';
      if (panels.length > 1) {
        const tabs = panels.map(p =>
          `<button type="button" class="ptab-btn${p.key === activeKey ? ' active' : ''}" ` +
          `role="tab" aria-selected="${p.key === activeKey}" data-ptab="${p.key}">${escapeHtml(p.label)}</button>`
        ).join('');
        body += `<div class="seg profile-tabs" role="tablist" aria-label="Relic sections">${tabs}</div>`;
      }
      body += panels.map(p =>
        `<div class="omni-tabpanel" role="tabpanel" data-ptab="${p.key}"${p.key === activeKey ? '' : ' hidden'}>${p.html}</div>`
      ).join('');
    }

    return `
      <header>
        <div class="portrait">${port}</div>
        <div>
          <h2 id="omni-modal-title">${escapeHtml(r.name)}</h2>
          ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
        </div>
        <button class="close" aria-label="Close">×</button>
      </header>
      <div class="body">${body}</div>`;
  }

  let openRelic = null;  // currently open relic, for in-place language re-render

  function openRelicProfile(name) {
    const r = RELIC_PROFILES.get(slugify(name));
    if (!r) { console.warn('openRelicProfile: no relic for', name); return; }
    openRelic = r;
    Omni.openModal(relicProfileHTML(r));
    const m = document.getElementById('omni-modal');
    if (m) m.classList.add('omni-profile');
  }

  function applySub() {
    setActiveBtn(ROOT.querySelector('#rl-subtabs'), b => b.dataset.sub === state.sub);
    for (const p of ROOT.querySelectorAll('.subpanel')) p.hidden = p.dataset.panel !== state.sub;
    if (state.sub === 'tier') renderTier();
    else render();
  }

  function setActiveBtn(seg, predicate) {
    for (const b of seg.querySelectorAll('button')) b.classList.toggle('active', predicate(b));
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    const seg = ROOT.querySelector('#rl-section-seg');
    for (const s of sections) {
      const btn = document.createElement('button');
      btn.dataset.section = s.slug;
      btn.textContent = shortLabel(s.title);
      btn.title = s.title;
      seg.appendChild(btn);
    }

    seg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-section]');
      if (!btn) return;
      state.section = btn.dataset.section;
      setActiveBtn(seg, b => b === btn);
      syncHash();
      render();
    });

    // Sub-tab switch (Priority | Tier List)
    ROOT.querySelector('#rl-subtabs').addEventListener('click', e => {
      const btn = e.target.closest('button[data-sub]');
      if (!btn || btn.dataset.sub === state.sub) return;
      state.sub = btn.dataset.sub;
      syncHash();
      applySub();
    });

    // Tier sort control — Overall (static) + one chip per mode column.
    const sortSeg = ROOT.querySelector('#rt-sort-seg');
    for (const c of TIER.columns) {
      const btn = document.createElement('button');
      btn.dataset.sort = c.key;
      btn.textContent = c.short;
      btn.title = 'Sắp theo ' + c.label;
      sortSeg.appendChild(btn);
    }
    sortSeg.addEventListener('click', e => {
      const btn = e.target.closest('button[data-sort]');
      if (btn) setSort(btn.dataset.sort);
    });

    // Tier table: tap a mode header to sort, tap a row to open its profile.
    tableView.addEventListener('click', e => {
      const th = e.target.closest('th[data-sort]');
      if (th) { setSort(th.dataset.sort); return; }
      const tr = e.target.closest('tr[data-name]');
      if (tr) openRelicProfile(tr.dataset.name);
    });

    // Priority cards: tap / Enter / Space opens the same relic profile.
    listView.addEventListener('click', e => {
      const card = e.target.closest('.rcard[data-name]');
      if (card) openRelicProfile(card.dataset.name);
    });
    listView.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const card = e.target.closest('.rcard[data-name]');
      if (!card) return;
      e.preventDefault();
      openRelicProfile(card.dataset.name);
    });

    // EN/VI toggle inside the relic modal. The shell's own .lang-btn listener
    // also fires (it may update the shared Omni.skillLang state first), but it
    // only re-renders #omni-skills-section, which never exists here; this one
    // owns #relic-skills-section. The "already active" guard reads the button,
    // not the shared state, so listener ordering can't swallow the re-render.
    document.getElementById('omni-modal').addEventListener('click', e => {
      const btn = e.target.closest('.lang-btn');
      if (!btn || btn.classList.contains('active')) return;
      const sec = document.getElementById('relic-skills-section');
      if (!sec || !openRelic || !openRelic.skill_profile) return;
      Omni.skillLang(btn.dataset.lang);
      sec.innerHTML = relicSkillsHTML(openRelic.skill_profile);
    });
  }

  function applyState() {
    const seg = ROOT.querySelector('#rl-section-seg');
    setActiveBtn(seg, b => b.dataset.section === state.section);
    if (state.section !== 'all' && !sections.some(s => s.slug === state.section)) {
      state.section = 'all';
      setActiveBtn(seg, b => b.dataset.section === 'all');
    }
    setActiveBtn(ROOT.querySelector('#rt-sort-seg'), b => b.dataset.sort === state.tsort);
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    applyState();
    applySub();
  });
})();
</script>

<!-- script: others -->
<script>
(() => {
  const SLUG = 'others';
  const ROOT = document.querySelector('.page-others');
  const ACCESSORIES = JSON.parse(document.getElementById('data-accessories').textContent);

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── Accessories Guide small page ─────────────────────────────────────────
  // Verdict buckets, in display order. `verdict` matches build_accessories.py.
  const GROUPS = [
    { verdict: 'priority',    title: 'Ưu tiên reroll (theo thứ tự)', note: 'Overall Order của tác giả — cao → thấp.' },
    { verdict: 'situational', title: 'Tuỳ tình huống',               note: 'Chỉ reroll khi đã xong hết các chỉ số ưu tiên.' },
    { verdict: 'skip',        title: 'Không cần thiết',              note: 'Bỏ qua — đừng lãng phí lượt reroll.' },
  ];

  function statCard(s) {
    const isPri = s.verdict === 'priority';
    const badge = isPri
      ? `<span class="rankbadge">${escapeHtml(s.order)}</span>`
      : (s.order ? `<span class="vchip v-${s.verdict}">${escapeHtml(s.order)}</span>` : '');
    return `<div class="scard v-${escapeHtml(s.verdict)}">
      <div class="shead">
        ${badge}
        <span class="sname">${escapeHtml(s.name)}</span>
      </div>
      ${s.advice ? `<div class="advice">${escapeHtml(s.advice)}</div>` : ''}
      ${s.example ? `<div class="example"><span class="lbl">VD / Ghi chú</span><span class="val">${escapeHtml(s.example)}</span></div>` : ''}
    </div>`;
  }

  function renderAccessories() {
    const stats = ACCESSORIES.stats || [];
    let html = `<div class="disclaimer">Tên chỉ số được suy ra từ icon trong sheet (icon không xuất ra được) — báo mình nếu có tên nào sai để sửa lại.</div>`;
    for (const g of GROUPS) {
      const items = stats.filter(s => s.verdict === g.verdict);
      if (!items.length) continue;
      html += `<section class="section">
        <div class="section-head"><h2>${escapeHtml(g.title)}</h2></div>
        <div class="section-note">${escapeHtml(g.note)}</div>
        <div class="stat-list">${items.map(statCard).join('')}</div>
      </section>`;
    }
    return html || `<div class="disclaimer">Chưa có dữ liệu.</div>`;
  }

  // ── Sub-page registry — add another entry to grow the "Others" menu ───────
  const SUBPAGES = [
    { key: 'accessories', label: 'Accessories', render: renderAccessories },
  ];

  const subtabsEl = ROOT.querySelector('#ot-subtabs');
  const viewEl = ROOT.querySelector('#ot-view');
  let initialized = false;
  let state = { sub: SUBPAGES[0].key };

  function isActive() { return Omni.getActivePage() === SLUG; }

  function readState() {
    if (!isActive()) return;
    const h = Omni.readPageHash();
    state.sub = SUBPAGES.some(p => p.key === h.sub) ? h.sub : SUBPAGES[0].key;
  }
  function syncHash() {
    if (!isActive()) return;
    const out = {};
    if (state.sub !== SUBPAGES[0].key) out.sub = state.sub;
    Omni.writePageHash(SLUG, out);
  }

  function initOnce() {
    if (initialized) return;
    initialized = true;

    // A single-page menu hides its sub-tab bar; 2+ pages reveal it.
    subtabsEl.classList.toggle('single', SUBPAGES.length < 2);
    subtabsEl.innerHTML = SUBPAGES.map(p =>
      `<button data-sub="${escapeHtml(p.key)}" role="tab">${escapeHtml(p.label)}</button>`
    ).join('');

    subtabsEl.addEventListener('click', e => {
      const btn = e.target.closest('button[data-sub]');
      if (!btn || btn.dataset.sub === state.sub) return;
      state.sub = btn.dataset.sub;
      syncHash();
      renderActive();
    });
  }

  function renderActive() {
    for (const b of subtabsEl.querySelectorAll('button')) {
      b.classList.toggle('active', b.dataset.sub === state.sub);
    }
    const page = SUBPAGES.find(p => p.key === state.sub) || SUBPAGES[0];
    viewEl.innerHTML = page.render();
  }

  Omni.onTab(SLUG, () => {
    initOnce();
    readState();
    renderActive();
  });
})();
</script>
